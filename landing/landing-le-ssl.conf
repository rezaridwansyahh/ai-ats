<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName myralix.com
    ServerAdmin webmaster@localhost

    # ====== LANDING PAGE (root) ======
    DocumentRoot /var/www/html/landing

    <Directory /var/www/html/landing>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback — exclude /portal from landing rewrites
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_URI} !^/portal
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    # Landing Backend API
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3001/api
    ProxyPassReverse /api http://localhost:3001/api

    # ====== ATS PORTAL ======
    # ATS Backend API (must be BEFORE Alias to take priority)
    ProxyPass /portal/api http://localhost:3000/api
    ProxyPassReverse /portal/api http://localhost:3000/api

    # ATS Frontend static files
    Alias /portal /var/www/html/portal

    <Directory /var/www/html/portal>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback for portal routes
        RewriteEngine On
        RewriteBase /portal/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/landing-error.log
    CustomLog ${APACHE_LOG_DIR}/landing-access.log combined

SSLCertificateFile /etc/letsencrypt/live/myralix.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/myralix.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
