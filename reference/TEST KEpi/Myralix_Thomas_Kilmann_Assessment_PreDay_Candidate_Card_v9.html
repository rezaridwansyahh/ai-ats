<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myralix — Thomas-Kilmann Assessment · Kandidat Card v9</title>
<style>
:root{
  --teal:#0A6E5C;--teal-dk:#064E3B;--teal-lt:#E0F0ED;--teal-xlt:#F0F8F6;
  --amber:#F59E0B;--amber-lt:#FEF3C7;--mint:#14B8A6;
  --rose:#E11D48;--slate:#1E293B;--slate-md:#475569;--slate-lt:#94A3B8;
  --cream:#FFF8F0;--white:#FFFFFF;--border:#E5E7EB;
  --shadow-sm:0 1px 3px rgba(30,41,59,.08);--shadow-md:0 4px 16px rgba(30,41,59,.1);
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--slate);font-family:'Trebuchet MS',Tahoma,Geneva,sans-serif;min-height:100vh;font-size:14px;line-height:1.65}
h1,h2,h3{font-family:Georgia,'Times New Roman',serif}
.navbar{background:var(--teal);padding:0 22px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(6,78,59,.3)}
.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-text{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:.04em}
.nav-badge{background:rgba(255,255,255,.18);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.06em}
.nav-hist{background:none;border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:5px 13px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.nav-hist:hover{background:rgba(255,255,255,.15)}
.wrap{max-width:900px;margin:0 auto;padding:24px 18px 70px}
.screen{display:none;animation:fu .3s ease}
.screen.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,var(--teal-dk),var(--teal) 55%,#0D9488);border-radius:var(--r);padding:30px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero h1{font-size:clamp(19px,3.5vw,26px);margin-bottom:6px;position:relative;z-index:1}
.hero p{font-size:13px;opacity:.88;line-height:1.65;max-width:500px;margin-bottom:12px;position:relative;z-index:1}
.mode-badges{display:flex;flex-wrap:wrap;gap:5px;position:relative;z-index:1}
.mb{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;color:#fff}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:500px){.info-grid{grid-template-columns:1fr}}
.ic{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;box-shadow:var(--shadow-sm)}
.ic-i{font-size:17px;margin-bottom:5px}
.ic-t{font-size:12px;font-weight:700;color:var(--slate);margin-bottom:2px}
.ic-d{font-size:12px;color:var(--slate-md);line-height:1.5}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.form-title{font-size:18px;margin-bottom:4px}
.form-sub{font-size:13px;color:var(--slate-md);margin-bottom:18px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:480px){.fg2{grid-template-columns:1fr}}
.fg1{margin-bottom:12px}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-md);margin-bottom:5px}
.finput,.fsel{width:100%;background:#FAFAFA;border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--slate);font-size:14px;font-family:inherit;outline:none;transition:.2s;appearance:none}
.finput:focus,.fsel:focus{border-color:var(--teal);background:#fff}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--slate-md);font-size:12px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px;font-family:inherit}
.back-btn:hover{color:var(--teal)}
.btn-main{background:var(--teal);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;width:100%;margin-top:12px;transition:.2s}
.btn-main:hover{background:var(--teal-dk)}
.btn-sec{background:none;border:1.5px solid var(--border);color:var(--slate-md);padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;width:100%}
.btn-sec:hover{border-color:var(--slate-md);color:var(--slate)}
.q-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;position:sticky;top:56px;z-index:90;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.q-bar-inner{max-width:900px;margin:0 auto;padding:9px 0;display:flex;align-items:center;gap:10px}
.q-num-b{padding:3px 10px;border-radius:20px;background:var(--teal-lt);color:var(--teal);font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.q-track{flex:1;background:var(--border);border-radius:99px;height:5px;overflow:hidden}
.q-fill{height:5px;border-radius:99px;background:var(--teal);transition:width .5s}
.q-pct{font-size:11px;color:var(--slate-lt);white-space:nowrap;flex-shrink:0}
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow-sm);margin:14px 0 11px}
.q-inst{font-size:12px;color:var(--slate-md);margin-bottom:18px;background:var(--teal-xlt);padding:10px 14px;border-radius:var(--rs);border-left:3px solid var(--teal)}
.pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:520px){.pair-grid{grid-template-columns:1fr}}
.pair-choice{background:#FAFAFA;border:2px solid var(--border);border-radius:var(--rs);padding:16px;cursor:pointer;transition:all .16s;position:relative}
.pair-choice:hover{border-color:var(--teal);background:var(--teal-xlt)}
.pair-choice.sel{border-color:var(--teal);background:var(--teal-lt)}
.pair-letter{width:28px;height:28px;border-radius:6px;background:var(--white);border:1.5px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--slate-md);margin-bottom:8px;font-family:Georgia,serif;transition:.16s}
.pair-choice.sel .pair-letter{background:var(--teal);border-color:var(--teal);color:#fff}
.pair-text{font-size:14px;color:var(--slate);line-height:1.6}
.q-foot{display:flex;align-items:center;gap:8px}
.btn-next{background:var(--teal);color:#fff;padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.2s;flex-shrink:0}
.btn-next:hover:not(:disabled){background:var(--teal-dk)}
.btn-next:disabled{opacity:.3;cursor:not-allowed}
.btn-prev{background:none;border:1.5px solid var(--border);color:var(--slate-md);padding:9px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;flex-shrink:0}
.btn-prev:disabled{opacity:.3;cursor:not-allowed}
.completion-hero{background:linear-gradient(135deg,var(--teal-dk),var(--teal));border-radius:var(--r);padding:48px 32px;color:#fff;margin-bottom:16px;text-align:center;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.completion-hero::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M20 20h20v20H20zM0 0h20v20H0z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.completion-icon{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:#A7F3D0;position:relative;z-index:1}
.completion-title{font-family:Georgia,serif;font-size:28px;font-weight:700;margin-bottom:8px;position:relative;z-index:1}
.completion-sub{font-size:14px;opacity:.85;line-height:1.6;max-width:380px;margin:0 auto;position:relative;z-index:1}
.completion-card{text-align:left}
.completion-msg{padding:6px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.hr-nav-card{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:1.5px solid var(--amber);border-radius:var(--r);padding:20px 22px;margin-top:18px;box-shadow:var(--shadow-sm)}
.hr-nav-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hr-nav-badge{background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.hr-nav-title{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#92400E}
.hr-nav-desc{font-size:13px;color:#78350F;line-height:1.65;margin-bottom:12px}
.hr-nav-note{font-size:11px;color:#92400E;line-height:1.55;margin-top:10px;font-style:italic;opacity:.85}
.btn-laporan{display:block;background:linear-gradient(135deg,var(--teal-dk),var(--teal));color:#fff;padding:13px 22px;border-radius:var(--rs);font-size:14px;font-weight:700;text-decoration:none;text-align:center;transition:.2s;box-shadow:0 4px 12px rgba(6,78,59,.25)}
.btn-laporan:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(6,78,59,.3)}
.hist-empty{text-align:center;padding:50px 20px;color:var(--slate-lt);background:var(--white);border:1px solid var(--border);border-radius:var(--r)}
.hi{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s}
.hi:hover{box-shadow:var(--shadow-md)}
.hi-hd{display:flex;align-items:center;gap:11px;padding:12px 14px}
.hi-icon{width:42px;height:42px;border-radius:9px;background:var(--teal-lt);color:var(--teal);display:grid;place-items:center;font-size:9px;font-weight:700;flex-shrink:0;text-align:center;line-height:1.3;font-family:Georgia,serif}
.hi-info{flex:1}
.hi-name{font-size:13px;font-weight:700}
.hi-sub{font-size:11px;color:var(--slate-lt)}
.hi-right{text-align:right;flex-shrink:0}
.hi-date{font-size:11px;color:var(--slate-lt)}
.hi-chev{font-size:14px;color:var(--slate-lt);margin-left:4px}
.hi-body{display:none;padding:0 14px 11px;border-top:1px solid var(--border)}
.hi-body.open{display:block;padding-top:9px}
.hi-scores-mini{display:flex;gap:6px;flex-wrap:wrap}
.hsm{padding:3px 7px;border-radius:4px;font-size:11px;font-weight:700;font-family:Georgia,serif}
.clr-btn{background:none;border:1px solid #FCA5A5;color:var(--rose);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;margin-left:auto}
.clr-btn:hover{background:#FFF1F2}

/* ── Print (card) ── */
.no-print{display:block;margin:14px 0}
@media print{.navbar,.no-print{display:none!important}.wrap{padding:0}body{background:#fff}}


</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-logo" onclick="go('welcome')">
      <svg width="26" height="26" viewBox="-50 -10 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0A6E5C"/><stop offset="100%" stop-color="#14B8A6"/></linearGradient>
          <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#F59E0B"/><stop offset="50%" stop-color="#14B8A6"/><stop offset="100%" stop-color="#0A6E5C"/></linearGradient>
        </defs>
        <path d="M30,10 C70,30 90,70 60,100 C30,130 70,170 90,190" stroke="url(#g1)" stroke-width="6" fill="none" stroke-linecap="round"/>

      <span class="logo-text">MYRALIX</span>

    <button class="nav-hist" onclick="go('history')">📋 Riwayat</button>
  </div>
</nav>
<div id="app"></div>

<script>
// ═══════════════════════ MODES ═══════════════════════
const MODES = {
  CP:{name:'Bersaing',eng:'Competing',color:'#DC2626',bg:'#FEF2F2',tag:'Asertif & Tidak Kooperatif',
    desc:'Anda mengejar tujuan sendiri dengan tegas, tidak memprioritaskan hubungan. Berguna saat keputusan cepat diperlukan, isu penting membutuhkan pendirian tegas, atau saat melindungi diri dari eksploitasi.',
    when:'Keputusan darurat · Isu prinsipil · Melindungi kepentingan vital',
    risk:'Dapat merusak kepercayaan jika terlalu sering digunakan'},
  CL:{name:'Berkolaborasi',eng:'Collaborating',color:'#0A6E5C',bg:'#E0F0ED',tag:'Asertif & Kooperatif',
    desc:'Anda berusaha memuaskan semua pihak secara penuh melalui kerja sama mendalam. Berguna saat kepentingan kedua pihak terlalu penting untuk dikompromikan dan ada waktu untuk eksplorasi bersama.',
    when:'Solusi integratif penting · Belajar dari perspektif lain · Membangun komitmen',
    risk:'Membutuhkan waktu dan energi besar; tidak cocok untuk isu minor'},
  CM:{name:'Berkompromi',eng:'Compromising',color:'#D97706',bg:'#FFFBEB',tag:'Tengah-tengah',
    desc:'Anda mencari solusi yang memberikan kepuasan sebagian kepada semua pihak. Berguna ketika solusi sempurna tidak memungkinkan dan kedua belah pihak perlu maju.',
    when:'Solusi sementara · Waktu terbatas · Tujuan keduanya cukup penting',
    risk:'Bisa menghasilkan solusi yang tidak optimal untuk kedua pihak'},
  AV:{name:'Menghindar',eng:'Avoiding',color:'#7C3AED',bg:'#F5F3FF',tag:'Tidak Asertif & Tidak Kooperatif',
    desc:'Anda tidak mengejar kepentingan sendiri maupun orang lain secara langsung. Berguna saat isu trivial, perlu waktu untuk menenangkan diri, atau informasi belum cukup.',
    when:'Isu tidak penting · Perlu pendinginan · Orang lain lebih mampu menangani',
    risk:'Masalah penting bisa terakumulasi jika selalu dihindari'},
  AC:{name:'Mengakomodasi',eng:'Accommodating',color:'#0891B2',bg:'#ECFEFF',tag:'Tidak Asertif & Kooperatif',
    desc:'Anda mengutamakan kebutuhan orang lain di atas kebutuhan sendiri. Berguna untuk menjaga hubungan baik, saat Anda salah, atau saat isu lebih penting bagi pihak lain.',
    when:'Menjaga hubungan · Isu lebih penting bagi orang lain · Membangun goodwill',
    risk:'Kepentingan sendiri bisa terabaikan jika terlalu sering digunakan'}
};

// ═══════════════════════ 30 ITEMS ═══════════════════════
// Format: {a:{text,mode}, b:{text,mode}}
const ITEMS = [
  // CP vs CL (3)
  {a:{t:'Saya mempertahankan posisi saya dengan tegas ketika ada ketidaksepakatan.',m:'CP'},b:{t:'Saya berusaha menemukan solusi yang benar-benar memenuhi kebutuhan semua pihak.',m:'CL'}},
  {a:{t:'Saya berjuang keras untuk pandangan saya dalam konflik.',m:'CP'},b:{t:'Saya senang mendiskusikan masalah secara mendalam hingga solusi terbaik ditemukan.',m:'CL'}},
  {a:{t:'Saya tidak mau mengalah dalam hal-hal yang saya anggap penting.',m:'CP'},b:{t:'Saya mengajak semua pihak berkolaborasi mencari solusi yang memuaskan semua.',m:'CL'}},
  // CP vs CM (3)
  {a:{t:'Saya menekan posisi saya dengan tegas untuk memastikan kepentingan saya terpenuhi.',m:'CP'},b:{t:'Saya mencari jalan tengah yang dapat diterima semua pihak dalam perselisihan.',m:'CM'}},
  {a:{t:'Saya berjuang untuk memastikan keinginan saya terwujud.',m:'CP'},b:{t:'Saya rela berkorban sebagian untuk mendapatkan solusi yang bisa disepakati bersama.',m:'CM'}},
  {a:{t:'Saya mempertahankan argumen saya dengan kuat dalam diskusi yang alot.',m:'CP'},b:{t:'Saya menawarkan dan menerima kompromi yang adil dari kedua belah pihak.',m:'CM'}},
  // CP vs AV (3)
  {a:{t:'Saya langsung menghadapi konflik dan berjuang untuk kepentingan saya.',m:'CP'},b:{t:'Saya menghindari situasi yang berpotensi memunculkan konflik tidak perlu.',m:'AV'}},
  {a:{t:'Saya tetap berdiri teguh pada posisi saya meski mendapat tekanan.',m:'CP'},b:{t:'Saya menunda membahas isu sensitif hingga waktu yang lebih kondusif.',m:'AV'}},
  {a:{t:'Saya mendorong agar masalah diselesaikan sesuai pandangan saya.',m:'CP'},b:{t:'Saya memilih tidak terlibat dalam perselisihan yang tidak benar-benar mendesak.',m:'AV'}},
  // CP vs AC (3)
  {a:{t:'Saya mempertahankan apa yang saya yakini meski orang lain tidak setuju.',m:'CP'},b:{t:'Saya mengikuti keinginan orang lain meski berbeda dari pendapat saya.',m:'AC'}},
  {a:{t:'Saya tidak mudah menyerah pada tekanan dari pihak lain.',m:'CP'},b:{t:'Saya rela mendahulukan kepentingan orang lain daripada kepentingan saya sendiri.',m:'AC'}},
  {a:{t:'Saya bersikeras pada sudut pandang saya dalam perselisihan.',m:'CP'},b:{t:'Saya lebih suka memenuhi harapan orang lain daripada berkeras pada pendapat saya.',m:'AC'}},
  // CL vs CM (3)
  {a:{t:'Saya berusaha menemukan solusi kreatif yang memuaskan semua pihak sepenuhnya.',m:'CL'},b:{t:'Saya mencari titik tengah yang dapat segera disepakati oleh semua pihak.',m:'CM'}},
  {a:{t:'Saya mendorong diskusi mendalam untuk mencapai solusi terbaik bagi semua.',m:'CL'},b:{t:'Saya menawarkan kesepakatan sebagian untuk mengakhiri perselisihan dengan cepat.',m:'CM'}},
  {a:{t:'Saya berkolaborasi mencari solusi yang benar-benar memenuhi semua kepentingan.',m:'CL'},b:{t:'Saya lebih suka mencapai kesepakatan cepat meski tidak sempurna.',m:'CM'}},
  // CL vs AV (3)
  {a:{t:'Saya mengajak semua pihak duduk bersama dan membahas perbedaan secara terbuka.',m:'CL'},b:{t:'Saya menghindari membahas isu yang bisa memperkeruh suasana tim.',m:'AV'}},
  {a:{t:'Saya ingin menyelesaikan konflik secara tuntas dan menyeluruh.',m:'CL'},b:{t:'Saya memilih tidak menyinggung topik yang bisa menimbulkan ketegangan.',m:'AV'}},
  {a:{t:'Saya mendorong percakapan jujur meskipun terasa tidak nyaman.',m:'CL'},b:{t:'Saya menghindari topik sensitif untuk menjaga suasana tetap kondusif.',m:'AV'}},
  // CL vs AC (3)
  {a:{t:'Saya mencari solusi yang memenuhi kebutuhan semua pihak secara penuh dan nyata.',m:'CL'},b:{t:'Saya mengalah pada keinginan orang lain demi menjaga hubungan yang baik.',m:'AC'}},
  {a:{t:'Saya berkolaborasi bersama semua pihak untuk menemukan jalan keluar yang memuaskan.',m:'CL'},b:{t:'Saya memprioritaskan kebutuhan orang lain di atas kebutuhan saya sendiri.',m:'AC'}},
  {a:{t:'Saya berusaha menemukan solusi win-win yang benar-benar menguntungkan semua pihak.',m:'CL'},b:{t:'Saya rela mengorbankan keinginan saya demi kepentingan orang yang saya pedulikan.',m:'AC'}},
  // CM vs AV (3)
  {a:{t:'Saya menawarkan solusi tengah agar masalah bisa cepat terselesaikan.',m:'CM'},b:{t:'Saya memilih mundur dari permasalahan yang tidak benar-benar krusial.',m:'AV'}},
  {a:{t:'Saya mengajukan kompromi yang adil untuk mengakhiri perselisihan.',m:'CM'},b:{t:'Saya menunda penyelesaian konflik hingga situasinya lebih mendukung.',m:'AV'}},
  {a:{t:'Saya rela melepas sebagian keinginan saya agar semua pihak bisa menyepakatinya.',m:'CM'},b:{t:'Saya memilih tidak terlibat dalam konflik yang terasa menguras energi percuma.',m:'AV'}},
  // CM vs AC (3)
  {a:{t:'Saya mencari jalan tengah yang memberikan kepuasan bagi semua pihak.',m:'CM'},b:{t:'Saya mengalah sepenuhnya untuk memenuhi keinginan orang lain.',m:'AC'}},
  {a:{t:'Saya menawarkan kompromi yang saling menguntungkan kedua belah pihak.',m:'CM'},b:{t:'Saya lebih suka memenuhi apa yang diinginkan orang lain daripada bernegosiasi.',m:'AC'}},
  {a:{t:'Saya mencari titik temu yang dapat diterima semua pihak yang terlibat.',m:'CM'},b:{t:'Saya menyesuaikan posisi saya sepenuhnya dengan keinginan pihak lain.',m:'AC'}},
  // AV vs AC (3)
  {a:{t:'Saya memilih menghindari konflik ketika hasilnya tidak sepadan dengan energi yang dikeluarkan.',m:'AV'},b:{t:'Saya memilih mengikuti keinginan orang lain daripada berdebat panjang.',m:'AC'}},
  {a:{t:'Saya menangguhkan diskusi tentang isu yang berpotensi menimbulkan konflik.',m:'AV'},b:{t:'Saya tidak keberatan mengorbankan keinginan saya untuk kepentingan orang lain.',m:'AC'}},
  {a:{t:'Saya menghindari situasi yang berpotensi menimbulkan pertentangan antar pihak.',m:'AV'},b:{t:'Saya dengan senang hati menyesuaikan diri dengan preferensi orang lain.',m:'AC'}},
];

// Shuffled display order
const ORDER = [2,7,14,0,22,11,18,5,27,13,20,3,25,9,16,1,28,10,23,6,15,24,12,17,4,19,26,8,21,29];

// Approximate normative averages from published TKI norms (±2 = average band)
const NORMS = {CP:{avg:6},CL:{avg:6},CM:{avg:7},AV:{avg:6},AC:{avg:7}};
function normBand(k,v){
  const a=NORMS[k].avg;
  if(v>=a+2)return{label:'Tinggi',color:'#059669',bg:'#ECFDF5'};
  if(v>=a-2)return{label:'Rata-rata',color:'#D97706',bg:'#FFFBEB'};
  return{label:'Rendah',color:'#6B7280',bg:'#F9FAFB'};
}
let S = {screen:'welcome',cand:{name:'',gender:'',umur:'',jabatan:'',dept:'',date:''},
  answers:[],currentQ:0,result:null};
const KEY = 'myx-tki-v1';                  // history list (preserved from v8)
const HKEY = 'myx-tki-preday-v9';          // handoff to laporan (latest {cand, result})
const LAPORAN_URL = 'Myralix_Thomas_Kilmann_Assessment_PreDay_Laporan_Psikologis_v9.html';
function loadHist(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}
function saveHist(r){const a=loadHist();a.unshift(r);localStorage.setItem(KEY,JSON.stringify(a.slice(0,200)))}
function clearHist(){if(confirm('Hapus semua riwayat TKI?')){localStorage.removeItem(KEY);go('history')}}
function saveHandoff(){try{localStorage.setItem(HKEY,JSON.stringify({cand:S.cand,result:S.result,savedAt:Date.now()}));}catch(e){}}
function go(s){
  S.screen=s;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  const app=document.getElementById('app');
  app.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  switch(S.screen){
    case 'welcome':app.innerHTML=renderWelcome();break;
    case 'form':app.innerHTML=renderForm();break;
    case 'test':app.innerHTML=renderTest();break;
    case 'result':app.innerHTML=renderResult();break;
    case 'history':app.innerHTML=renderHistory();break;
  }
}

function renderWelcome(){
  return `<div class="screen active"><div class="wrap">
  <div class="hero">
    <h1>Thomas-Kilmann Assessment</h1>
    <p>Instrumen pengembangan diri untuk memahami gaya penanganan konflik Anda. Tidak ada mode yang lebih baik — setiap mode memiliki kegunaan situasionalnya masing-masing.</p>
    <div class="mode-badges">
      ${Object.entries(MODES).map(([k,v])=>`<span class="mb" style="background:${v.color}aa">${v.name}</span>`).join('')}
    </div>
  </div>
  <div class="info-grid">
    <div class="ic"><div class="ic-i">📝</div><div class="ic-t">30 Pernyataan Berpasangan</div><div class="ic-d">Pilih satu dari dua pernyataan yang paling menggambarkan Anda.</div></div>
    <div class="ic"><div class="ic-i">⏱️</div><div class="ic-t">~15 Menit</div><div class="ic-d">Jawab berdasarkan intuisi pertama Anda.</div></div>
    <div class="ic"><div class="ic-i">🎯</div><div class="ic-t">5 Mode Konflik</div><div class="ic-d">Competing, Collaborating, Compromising, Avoiding, Accommodating.</div></div>
    <div class="ic"><div class="ic-i">💡</div><div class="ic-t">Untuk Pengembangan</div><div class="ic-d">Hasil ditujukan untuk membangun kesadaran diri — tidak ada jawaban salah.</div></div>
  </div>
  <div class="form-card">
    <button class="btn-main" onclick="go('form')">Mulai Asesmen →</button>
    <button class="btn-sec" style="margin-top:8px" onclick="go('history')">📋 Lihat Riwayat</button>
  </div>
  </div></div>`;
}

function renderForm(){
  return `<div class="screen active"><div class="wrap">
  <button class="back-btn" onclick="go('welcome')">← Kembali</button>
  <div class="form-card">
    <h2 class="form-title">Data Peserta</h2>
    <p class="form-sub">Informasi ini digunakan untuk laporan hasil Anda.</p>
    <div class="fg2">
      <div><label class="flabel">Nama Lengkap *</label><input class="finput" id="f-name" placeholder="Nama Anda" /></div>
      <div><label class="flabel">Jenis Kelamin</label>
        <select class="fsel" id="f-gender"><option value="">Pilih</option><option>Laki-laki</option><option>Perempuan</option></select>
      </div>
    </div>
    <div class="fg2">
      <div><label class="flabel">Usia</label><input class="finput" id="f-umur" placeholder="Contoh: 28 tahun" /></div>
      <div><label class="flabel">Jabatan</label><input class="finput" id="f-jabatan" placeholder="Posisi Anda" /></div>
    </div>
    <div class="fg1"><label class="flabel">Departemen / Tim</label><input class="finput" id="f-dept" placeholder="Divisi atau tim Anda" /></div>
    <button class="btn-main" onclick="startTest()">Mulai Tes →</button>
  </div>
  </div></div>`;
}

function startTest(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Nama wajib diisi.');return;}
  S.cand={name,gender:document.getElementById('f-gender').value,umur:document.getElementById('f-umur').value,
    jabatan:document.getElementById('f-jabatan').value,dept:document.getElementById('f-dept').value,
    date:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})};
  S.answers=new Array(30).fill(null);S.currentQ=0;go('test');
}

function renderTest(){
  const qi=ORDER[S.currentQ];
  const item=ITEMS[qi];
  const pct=Math.round((S.currentQ/30)*100);
  const ans=S.answers[S.currentQ];
  return `
  <div class="q-bar"><div class="q-bar-inner">
    <span class="q-num-b">Pernyataan ${S.currentQ+1} / 30</span>
    <div class="q-track"><div class="q-fill" style="width:${pct}%"></div></div>
    <span class="q-pct">${pct}%</span>
  </div></div>
  <div class="screen active"><div class="wrap">
  <div class="q-card">
    <p class="q-inst">Pilih <strong>satu pernyataan</strong> yang paling menggambarkan cara Anda biasanya menghadapi ketidaksepakatan atau konflik.</p>
    <div class="pair-grid">
      <div class="pair-choice${ans==='A'?' sel':''}" onclick="pick('A')">
        <div class="pair-letter">A</div>
        <p class="pair-text">${item.a.t}</p>
      </div>
      <div class="pair-choice${ans==='B'?' sel':''}" onclick="pick('B')">
        <div class="pair-letter">B</div>
        <p class="pair-text">${item.b.t}</p>
      </div>
    </div>
    <div class="q-foot">
      <button class="btn-prev" onclick="prevQ()" ${S.currentQ===0?'disabled':''}>← Kembali</button>
      <div style="flex:1"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()" ${ans===null?'disabled':''}>
        ${S.currentQ===29?'Lihat Hasil ✓':'Selanjutnya →'}
      </button>
    </div>
  </div>
  </div></div>`;
}

function pick(v){
  S.answers[S.currentQ]=v;
  document.querySelectorAll('.pair-choice').forEach((el,i)=>{el.classList.toggle('sel',i===(v==='A'?0:1));});
  const btn=document.getElementById('btn-next');if(btn)btn.disabled=false;
}
function prevQ(){if(S.currentQ>0){S.currentQ--;go('test');}}
function nextQ(){
  if(S.answers[S.currentQ]===null)return;
  if(S.currentQ<29){S.currentQ++;go('test');}
  else calcResult();
}

function calcResult(){
  const scores={CP:0,CL:0,CM:0,AV:0,AC:0};
  S.answers.forEach((ans,idx)=>{
    const qi=ORDER[idx];const item=ITEMS[qi];
    if(ans==='A')scores[item.a.m]++;
    else if(ans==='B')scores[item.b.m]++;
  });
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const dominant=sorted[0][0];
  S.result={cand:S.cand,scores,dominant,date:S.cand.date};
  saveHandoff();
  // Auto-save to history on completion (was previously a manual button)
  saveHist({ts:Date.now(),name:S.cand.name,gender:S.cand.gender,umur:S.cand.umur,
    jabatan:S.cand.jabatan,dept:S.cand.dept,date:S.cand.date,scores,dominant});
  go('result');
}


function renderResult(){
  const r=S.result;
  const name=r&&r.cand&&r.cand.name?r.cand.name:'';
  return`<div class="screen active"><div class="wrap">
  <div class="completion-hero">
    <div class="completion-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="completion-title">Asesmen Selesai</h1>
    <p class="completion-sub">Terima kasih${name?', '+name:''}. Jawaban Anda telah tersimpan.</p>
  </div>
  <div class="form-card completion-card">
    <div class="completion-msg">
      <p style="margin-bottom:10px"><strong>Apa selanjutnya?</strong></p>
      <p style="font-size:13px;color:var(--slate-md);line-height:1.7">
        Hasil asesmen Anda telah dicatat dan akan ditinjau oleh tim HR/fasilitator.
        Anda akan menerima debrief dan pembahasan hasil pada sesi onboarding berikutnya.
      </p>
      <p style="font-size:13px;color:var(--slate-md);line-height:1.7;margin-top:10px">
        Mode konflik bukan penilaian baik/buruk — setiap mode memiliki kegunaan
        situasionalnya masing-masing.
      </p>
    </div>
    <button class="btn-main" onclick="go('welcome')">← Kembali ke Beranda</button>
  </div>
  <div class="hr-nav-card">
    <div class="hr-nav-header">
      <span class="hr-nav-badge">🔒 HR / Fasilitator</span>
      <div class="hr-nav-title">Buat Laporan Psikologis</div>
    </div>
    <p class="hr-nav-desc">
      Untuk membuat dan meninjau laporan psikologis kandidat, klik tombol di bawah.
      Laporan akan dibuka di tab baru dan dapat dicetak atau disimpan sebagai PDF.
    </p>
    <a href="${LAPORAN_URL}" target="_blank" onclick="saveHandoff()" class="btn-laporan">
      📊 Buka Laporan Psikologis →
    </a>
    <p class="hr-nav-note">
      Akses ini ditujukan untuk HR/fasilitator yang melakukan asesmen.
      Data peserta otomatis tersinkron dari kartu asesmen ini.
    </p>
  </div>
  </div></div>`;
}

function afterResult(){/* no-op: result view no longer renders charts */}
function doSave(){/* no-op: history is saved automatically on completion */}


function renderHistory(){
  const all=loadHist();
  return `<div class="wrap" style="padding-top:18px">
  <button class="back-btn" onclick="go('welcome')">← Beranda</button>
  <h2 style="font-size:20px;margin-bottom:5px">Riwayat TKI</h2>
  <p style="font-size:12px;color:var(--slate-md);margin-bottom:14px">${all.length} hasil tersimpan
    ${all.length?`<button class="clr-btn" onclick="clearHist()">Hapus Semua</button>`:''}
  </p>
  ${all.length===0?`<div class="hist-empty"><div style="font-size:30px;margin-bottom:8px;opacity:.4">📋</div><p>Belum ada hasil tersimpan.</p></div>`
  :all.map((r,i)=>`<div class="hi" onclick="toggleH(${i})">
    <div class="hi-hd">
      <div class="hi-icon" style="background:${MODES[r.dominant]?.bg||'var(--teal-lt)'};color:${MODES[r.dominant]?.color||'var(--teal)'}">TKI</div>
      <div class="hi-info"><div class="hi-name">${r.name}</div><div class="hi-sub">${r.jabatan||''}${r.dept?' · '+r.dept:''}</div></div>
      <div class="hi-right"><div class="hi-date">${r.date}</div><div style="font-size:11px;color:${MODES[r.dominant]?.color||'var(--teal)'}">⬤ ${MODES[r.dominant]?.name||''}</div></div>
      <div class="hi-chev" id="hc-${i}">›</div>
    </div>
    <div class="hi-body" id="hb-${i}">
      <div class="hi-scores-mini">
        ${Object.entries(r.scores||{}).map(([k,v])=>`<span class="hsm" style="background:${MODES[k]?.bg};color:${MODES[k]?.color}">${MODES[k]?.name}:${v}</span>`).join('')}
      </div>
    </div>
  </div>`).join('')}
  </div>`;
}

function toggleH(i){
  const b=document.getElementById(`hb-${i}`),c=document.getElementById(`hc-${i}`);
  if(b){b.classList.toggle('open');if(c)c.textContent=b.classList.contains('open')?'▾':'›';}
}

// Anti-AI security (light — onboarding context)
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12'||(e.ctrlKey&&['u','U','s','S'].includes(e.key))){e.preventDefault();}
});




render();
</script>
</body>
</html>
