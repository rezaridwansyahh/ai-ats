<style>
:root{
  --teal:#0A6E5C;--teal-dk:#064E3B;--teal-lt:#E0F0ED;--teal-xlt:#F0F8F6;
  --amber:#F59E0B;--amber-lt:#FEF3C7;--amber-dk:#92400E;--cream:#FFF8F0;--white:#fff;
  --border:#E5E7EB;--slate:#1E293B;--slate-md:#475569;--slate-lt:#94A3B8;
  --sh-sm:0 1px 3px rgba(30,41,59,.08);--sh-md:0 4px 16px rgba(30,41,59,.1);
  --r:12px;--rs:8px;
  --pass:#059669;--pass-bg:#ECFDF5;--pass-br:#BBF7D0;
  --warn:#D97706;--warn-bg:#FFFBEB;--warn-br:#FDE68A;
  --fail:#DC2626;--fail-bg:#FEF2F2;--fail-br:#FCA5A5;
  --RED:#DC2626;--RED-lt:#FEF2F2;--RED-dk:#991B1B;
  --YEL:#F59E0B;--YEL-lt:#FEF3C7;--YEL-dk:#92400E;

}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--slate);font-family:'Trebuchet MS',Tahoma,Geneva,sans-serif;min-height:100vh;font-size:14px}
h1,h2,h3{font-family:Georgia,serif}
.navbar{background:var(--teal);padding:0 22px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(6,78,59,.3)}
.nav-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-txt{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:.04em}
.nav-badge{background:rgba(255,255,255,.18);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.nav-hist{background:none;border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:5px 13px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.wrap{max-width:860px;margin:0 auto;padding:24px 18px 80px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fu .3s ease}
.hero{background:linear-gradient(135deg,#1E1B4B,#4338CA 55%,#7C3AED);border-radius:var(--r);padding:32px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'⬟';position:absolute;right:-10px;top:-20px;font-size:130px;opacity:.06;line-height:1}
.hero h1{font-size:clamp(18px,3.5vw,26px);margin-bottom:8px;position:relative;z-index:1}
.hero p{font-size:13px;opacity:.88;line-height:1.7;max-width:520px;margin-bottom:14px;position:relative;z-index:1}
.hero-pills{display:flex;flex-wrap:wrap;gap:7px;position:relative;z-index:1}
.hp{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.22)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:500px){.info-grid{grid-template-columns:1fr}}
.ic{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;box-shadow:var(--sh-sm)}
.ic-i{font-size:18px;margin-bottom:5px}.ic-t{font-size:12px;font-weight:700;margin-bottom:2px}.ic-d{font-size:12px;color:var(--slate-md);line-height:1.55}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--sh-sm);margin-bottom:14px}
.form-title{font-size:18px;margin-bottom:4px}
.form-sub{font-size:13px;color:var(--slate-md);margin-bottom:18px}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--slate-md);font-size:12px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px;font-family:inherit}
.back-btn:hover{color:var(--teal)}
.completion-hero{background:linear-gradient(135deg,#0F766E,var(--teal-dk));border-radius:var(--r);padding:48px 32px;color:#fff;margin-bottom:16px;text-align:center;box-shadow:var(--sh-md)}
.completion-icon{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:#A7F3D0}
.completion-title{font-family:Georgia,serif;font-size:28px;font-weight:700;margin-bottom:8px}
.completion-sub{font-size:14px;opacity:.85;line-height:1.6;max-width:380px;margin:0 auto}
.completion-card{text-align:left}
.completion-msg{padding:6px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.hr-nav-card{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:1.5px solid var(--amber);border-radius:var(--r);padding:20px 22px;margin-top:18px;box-shadow:var(--sh-sm)}
.hr-nav-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hr-nav-badge{background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.hr-nav-title{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--amber-dk)}
.hr-nav-desc{font-size:13px;color:#78350F;line-height:1.65;margin-bottom:12px}
.hr-nav-note{font-size:11px;color:#92400E;line-height:1.55;margin-top:10px;font-style:italic;opacity:.85}
.btn-laporan{display:block;background:linear-gradient(135deg,#4338CA,#7C3AED);color:#fff;padding:13px 22px;border-radius:var(--rs);font-size:14px;font-weight:700;text-decoration:none;text-align:center;transition:.2s;box-shadow:0 4px 12px rgba(67,56,202,.25)}
.btn-laporan:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(67,56,202,.3)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:480px){.fg2{grid-template-columns:1fr}}
.fg1{margin-bottom:12px}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--slate-md);margin-bottom:4px}
.finput,.fsel{width:100%;background:#FAFAFA;border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 13px;color:var(--slate);font-size:14px;font-family:inherit;outline:none;transition:.2s;appearance:none}
.finput:focus,.fsel:focus{border-color:var(--teal);background:#fff}
.btn-main{background:var(--teal);color:#fff;padding:13px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;width:100%;margin-top:12px;transition:.2s}
.btn-main:hover{background:var(--teal-dk)}
.btn-sec{background:none;border:1.5px solid var(--border);color:var(--slate-md);padding:11px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;width:100%}
.btn-amber{background:var(--amber);color:var(--slate);padding:13px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;width:100%;transition:.2s}
.instr-box{background:var(--amber-lt);border:1px solid #FDE68A;border-radius:var(--rs);padding:13px 16px;margin-bottom:14px}
.ib-t{font-size:13px;font-weight:700;color:var(--amber-dk);margin-bottom:5px}
.ib-d{font-size:12px;color:#78350F;line-height:1.68}
/* QUESTION */
.q-topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;position:sticky;top:56px;z-index:90;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.q-topbar-inner{max-width:860px;margin:0 auto;padding:9px 0;display:flex;align-items:center;gap:10px}
.q-prog-track{flex:1;background:var(--border);border-radius:99px;height:5px;overflow:hidden}
.q-prog-fill{height:5px;border-radius:99px;background:linear-gradient(90deg,#4338CA,#7C3AED);transition:width .3s}
.q-ans-count{font-size:11px;font-weight:700;color:#4338CA}
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--sh-sm);margin-bottom:14px;user-select:none;-webkit-user-select:none}
.q-num{font-size:11px;font-weight:700;color:var(--slate-lt);margin-bottom:12px;letter-spacing:.06em;text-transform:uppercase}
.q-choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.q-choices{grid-template-columns:1fr}}
.q-choice{padding:14px 16px;border-radius:var(--rs);border:1.5px solid var(--border);background:#FAFAFA;cursor:pointer;transition:.14s;font-size:13px;line-height:1.65;text-align:left}
.q-choice:hover{border-color:#4338CA;background:#EEF2FF}
.q-choice.sel{border-color:#4338CA;background:#EEF2FF;font-weight:600;box-shadow:0 0 0 2px rgba(67,56,202,.15)}
.q-choice-let{font-size:10px;font-weight:800;text-transform:uppercase;color:#4338CA;letter-spacing:.06em;margin-bottom:5px}
.q-footer{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.btn-prev{background:none;border:1.5px solid var(--border);color:var(--slate-md);padding:9px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-prev:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.btn-prev:disabled{opacity:.35;cursor:not-allowed}
.btn-next{background:#4338CA;color:#fff;padding:9px 18px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn-next:hover:not(:disabled){background:#3730A3}
.btn-next:disabled{opacity:.35;cursor:not-allowed}
.tab-warn-bar{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--rs);padding:9px 14px;font-size:12px;color:#DC2626;margin-bottom:12px;display:none}
.tab-warn-bar.show{display:block}
/* HISTORY */
.hist-empty{text-align:center;padding:50px 20px;color:var(--slate-lt);background:var(--white);border:1px solid var(--border);border-radius:var(--r)}
.hi{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;box-shadow:var(--sh-sm)}
.hi-hd{display:flex;align-items:center;gap:11px;padding:12px 15px;cursor:pointer}
.hi-icon{width:44px;height:44px;border-radius:9px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.hi-info{flex:1}.hi-name{font-size:13px;font-weight:700}.hi-sub{font-size:11px;color:var(--slate-lt)}
.hi-right{text-align:right;flex-shrink:0}
.hi-score{font-family:Georgia,serif;font-size:18px;font-weight:700}
.hi-date{font-size:11px;color:var(--slate-lt)}
.hi-body{display:none;padding:0 15px 12px;border-top:1px solid var(--border)}.hi-body.open{display:block;padding-top:9px}
.no-print{display:block;margin:14px 0}
@media print{.navbar,.no-print{display:none!important}.wrap{padding:0}body{background:#fff}}

</style>
</head>

// ── SCORING ──
function computeProfile(answers){
  let E=0,I=0,T=0,F=0,S=0,N=0;
  answers.forEach((ans,i)=>{
    if(ans===null)return;
    const p=PAIRS[i];
    const dim=ans==='A'?p.sa:p.sb;
    if(dim==='E')E++;else if(dim==='I')I++;
    else if(dim==='T')T++;else if(dim==='F')F++;
    else if(dim==='S')S++;else if(dim==='N')N++;
  });
  // Normalize to percent (max 24 per scale)
  const Epct=Math.round(E/24*100), Ipct=100-Epct;
  const Tpct=Math.round(T/24*100), Fpct=100-Tpct;
  const Spct=Math.round(S/24*100), Npct=100-Spct;
  // 4 quadrant color scores (0-100)
  const RED  =Math.round((Epct+Tpct)/2);
  const YEL  =Math.round((Epct+Fpct)/2);
  const GRN  =Math.round((Ipct+Fpct)/2);
  const BLU  =Math.round((Ipct+Tpct)/2);
  // Dominant quadrant
  const quad={RED,YEL,GRN,BLU};
  const dominantColor=Object.entries(quad).sort((a,b)=>b[1]-a[1])[0][0];
  // S/N secondary
  const variant=Spct>=50?'S':'N';
  const profileId=dominantColor+'_'+variant;
  const profile=PROFILES[profileId];
  // Composite 1-10 = clarity of dominant profile (how concentrated the score is)
  const dominantScore=quad[dominantColor];
  const composite=Math.max(1,Math.min(10,Math.round((dominantScore-40)/(65-40)*9+1)));
  const verdictV=composite>=7?'pass':composite>=5?'warn':'fail';
  return{E,I,T,F,S,N,Epct,Ipct,Tpct,Fpct,Spct,Npct,
         RED,YEL,GRN,BLU,dominantColor,variant,profileId,profile,
         composite,verdictV};
}

function pctToScore10(pct){return Math.max(1,Math.min(10,Math.round(pct/10)));}
function getVerdict(s10){
  if(s10>=7)return{v:'pass',label:'PROFIL JELAS',emoji:'✅'};
  if(s10>=5)return{v:'warn',label:'PROFIL CAMPURAN',emoji:'⚡'};
  return{v:'fail',label:'PROFIL BERAGAM',emoji:'🔄'};
}

    <div class="ic"><div class="ic-i">⚖️</div><div class="ic-t">Format Pilihan Paksa</div><div class="ic-d">Setiap soal menyajikan dua pernyataan — pilih satu yang LEBIH mencerminkan cara Anda bekerja dan berpikir sehari-hari. Tidak ada jawaban benar atau salah.</div></div>
    <div class="ic"><div class="ic-i">🧩</div><div class="ic-t">3 Dimensi Kepribadian</div><div class="ic-d">Tes ini mengukur orientasi energi, cara pengambilan keputusan, dan pendekatan terhadap informasi — menghasilkan 1 dari 8 profil kepribadian kerja.</div></div>
    <div class="ic"><div class="ic-i">📊</div><div class="ic-t">Profil Lengkap</div><div class="ic-d">Hasil mencakup profil dominan, kekuatan dan area pengembangan, serta panduan interpretasi untuk rekruter.</div></div>
    <div class="ic"><div class="ic-i">🚫</div><div class="ic-t">Jawab Jujur</div><div class="ic-d">Pilih berdasarkan cara Anda BENAR-BENAR bekerja — bukan yang terlihat paling ideal. Hasilnya lebih akurat jika Anda jujur tentang preferensi nyata.</div></div>
  </div>
  <div class="instr-box">
    <div class="ib-t">📌 Petunjuk Penting</div>
    <div class="ib-d">• Tidak ada batas waktu formal — kerjakan dengan santai namun fokus<br>• Pilih berdasarkan PREFERENSI alami, bukan yang terlihat paling profesional<br>• Perpindahan tab saat tes berlangsung akan dicatat<br>• Jawaban pertama Anda biasanya yang paling akurat — jangan terlalu lama berpikir</div>
  </div>
  <button class="btn-main" onclick="go('form')">Mulai Tes →</button>`;
}

// ── FORM ──
function renderForm(){
  return`
  <button class="back-btn" onclick="go('welcome')">← Kembali</button>
  <div class="form-card">
    <h2 class="form-title">Data Peserta</h2>
    <p class="form-sub">Informasi ini digunakan untuk laporan hasil Anda.</p>
    <div class="fg2">
      <div><label class="flabel">Nama Lengkap *</label>
        <input class="finput" id="fn" placeholder="Nama Anda"></div>
      <div><label class="flabel">Jabatan</label>
        <input class="finput" id="fj" placeholder="Posisi Anda"></div>
    </div>
    <div class="fg2">
      <div><label class="flabel">Tanggal Lahir *</label>
        <input class="finput" type="date" id="fl"></div>
      <div><label class="flabel">Pendidikan Terakhir</label>
        <select class="fsel" id="fp">
          <option value="">Pilih</option>
          <option>SMA/SMK</option><option>D3</option><option>S1</option><option>S2</option><option>S3</option>
        </select></div>
    </div>
    <div class="fg1"><label class="flabel">Tanggal Tes</label>
      <input class="finput" type="date" id="ft" value="${new Date().toISOString().split('T')[0]}"></div>
    <button class="btn-main" onclick="startTest()">Mulai Tes →</button>
  </div>`;
}

function startTest(){
  const nm=document.getElementById('fn')?.value?.trim()||'';
  const lb=document.getElementById('fl')?.value||'';
  if(!nm||!lb){alert('Nama dan tanggal lahir wajib diisi.');return;}
  S.cand={name:nm,tglLahir:lb,jabatan:document.getElementById('fj')?.value?.trim()||'',
    pendidikan:document.getElementById('fp')?.value||'',tglTes:document.getElementById('ft')?.value||''};
  S.answers=new Array(TOTAL_Q).fill(null);
  S.curQ=0;_tabSw=0;
  antiAiInit();
  go('test');
}

// ── TEST ──
function renderTest(){
  const q=PAIRS[S.curQ];
  const ans=S.answers[S.curQ];
  const answered=S.answers.filter(a=>a!==null).length;
  const pct=Math.round((S.curQ+1)/TOTAL_Q*100);
  const section=S.curQ<24?'Bagian 1 / 3':S.curQ<48?'Bagian 2 / 3':'Bagian 3 / 3';
  return`
  <div class="q-topbar"><div class="q-topbar-inner">
    <div class="q-prog-track"><div class="q-prog-fill" style="width:${pct}%"></div></div>
    <span class="q-ans-count">${answered}/${TOTAL_Q} terjawab</span>
    <span style="font-size:10px;color:var(--slate-lt)">${section}</span>
  </div></div>
  <div id="tabWarn" class="tab-warn-bar">⚠️ Perpindahan tab terdeteksi (<span id="tabCount">${_tabSw}</span>×) — dicatat dalam laporan.</div>
  <div class="q-card">
    <div class="q-num">Soal ${S.curQ+1} dari ${TOTAL_Q} &nbsp;·&nbsp; ${section}</div>
    <div class="q-choices">
      <div class="q-choice${ans==='A'?' sel':''}" onclick="selectAns('A')">
        <div class="q-choice-let">Pilihan A</div>
        ${q.a}
      </div>
      <div class="q-choice${ans==='B'?' sel':''}" onclick="selectAns('B')">
        <div class="q-choice-let">Pilihan B</div>
        ${q.b}
      </div>
    </div>
    <div class="q-footer">
      <button class="btn-prev" onclick="prevQ()" ${S.curQ===0?'disabled':''}>← Sebelumnya</button>
      <span style="flex:1;font-size:11px;color:var(--slate-lt);text-align:center">${S.curQ+1} / ${TOTAL_Q}</span>
      ${S.curQ<TOTAL_Q-1
        ?'<button class="btn-next" onclick="nextQ()">Berikutnya →</button>'
        :'<button class="btn-next" onclick="computeAndShow()">Lihat Hasil →</button>'}
    </div>
  </div>`;
}

function selectAns(v){S.answers[S.curQ]=v;if(S.curQ<TOTAL_Q-1){S.curQ++;go('test');}else{go('test');}}
function prevQ(){if(S.curQ>0){S.curQ--;go('test');}}
function nextQ(){if(S.curQ<TOTAL_Q-1){S.curQ++;go('test');}}

function computeAndShow(){
  const unanswered=S.answers.filter(a=>a===null).length;
  if(unanswered>0&&!confirm(`${unanswered} soal belum dijawab. Lanjutkan ke hasil?`))return;
  const r=computeProfile(S.answers);
  const date=new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  S.result={...r,date,cand:{...S.cand},tabSwitches:_tabSw};
  saveHandoff();
  saveHist({name:S.cand.name,jabatan:S.cand.jabatan,date,profileId:r.profileId,composite:r.composite,
    dominantColor:r.dominantColor,Epct:r.Epct,Tpct:r.Tpct,Spct:r.Spct,verdictV:r.verdictV});
  go('result');
}

// ── RESULT ──
function renderResult(){
  const r=S.result;
  const name=r&&r.cand&&r.cand.name?r.cand.name:'';
  return`
  <div class="completion-hero">
    <div class="completion-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="completion-title">Asesmen Selesai</h1>
    <p class="completion-sub">Terima kasih${name?', '+name:''}. Jawaban Anda telah tersimpan.</p>
  </div>
  <div class="form-card completion-card">
    <div class="completion-msg">
      <p style="margin-bottom:10px"><strong>Apa selanjutnya?</strong></p>
      <p style="font-size:13px;color:var(--slate-md);line-height:1.7">
        Hasil asesmen Anda telah dicatat dan akan ditinjau oleh tim HR/fasilitator.
        Anda akan menerima debrief dan pembahasan hasil pada sesi onboarding berikutnya.
      </p>
      <p style="font-size:13px;color:var(--slate-md);line-height:1.7;margin-top:10px">
        Profil kepribadian bukan penilaian baik/buruk — hanya gambaran gaya komunikasi
        dan preferensi kerja Anda.
      </p>
    </div>
    <button class="btn-main" onclick="go('welcome')">← Kembali ke Beranda</button>
  </div>
  <div class="hr-nav-card">
    <div class="hr-nav-header">
      <span class="hr-nav-badge">🔒 HR / Fasilitator</span>
      <div class="hr-nav-title">Buat Laporan Psikologis</div>
    </div>
    <p class="hr-nav-desc">
      Untuk membuat dan meninjau laporan psikologis kandidat, klik tombol di bawah.
      Laporan akan dibuka di tab baru dan dapat dicetak atau disimpan sebagai PDF.
    </p>
    <a href="${LAPORAN_URL}" target="_blank" onclick="saveHandoff()" class="btn-laporan">
      📊 Buka Laporan Psikologis →
    </a>
    <p class="hr-nav-note">
      Akses ini ditujukan untuk HR/fasilitator yang melakukan asesmen.
      Data peserta otomatis tersinkron dari kartu asesmen ini.
    </p>
  </div>`;
}

function afterResult(){/* no-op: result view no longer renders charts */}
function doSave(){/* no-op: history is saved automatically on completion */}


// ── HISTORY ──
function renderHistory(){
  const hist=loadHist();
  if(!hist.length)return`
  <div class="hist-empty">
    <div style="font-size:32px;margin-bottom:10px">📋</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">Belum Ada Riwayat</div>
    <p style="font-size:13px">Hasil tes tersimpan di sini secara otomatis.</p>
    <button class="btn-main" style="max-width:220px;margin:16px auto 0" onclick="go('welcome')">Mulai Tes</button>
  </div>`;
  return`
  <h2 style="font-size:16px;margin-bottom:14px">Riwayat Tes</h2>
  ${hist.map((r,i)=>{
    const p=PROFILES[r.profileId];
    return`<div class="hi">
      <div class="hi-hd" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="hi-icon" style="background:${p?.colorLt||'#F3F4F6'};color:${p?.color||'#6B7280'}">${p?.icon||'🧩'}</div>
        <div class="hi-info">
          <div class="hi-name">${r.name||'—'}</div>
          <div class="hi-sub">${r.date||''}${r.jabatan?' · '+r.jabatan:''}</div>
        </div>
        <div class="hi-right">
          <div class="hi-score" style="color:${p?.color||'#6B7280'}">${r.composite||'—'}/10</div>
          <div class="hi-date">${p?.name||r.profileId||'—'}</div>
        </div>
      </div>
      <div class="hi-body" id="hb${i}">
        <div style="font-size:12px;color:var(--slate-md);line-height:1.8">
          Profil: <strong>${p?.name||r.profileId}</strong> · ${p?.tagline||''}<br>
          E/I: ${r.Epct>=50?'E'+r.Epct+'%':'I'+(100-r.Epct)+'%'} · T/F: ${r.Tpct>=50?'T'+r.Tpct+'%':'F'+(100-r.Tpct)+'%'} · S/N: ${r.Spct>=50?'S'+r.Spct+'%':'N'+(100-r.Spct)+'%'}
        </div>
      </div>
    </div>`;
  }).join('')}
  <button class="btn-sec" style="margin-top:10px" onclick="if(confirm('Hapus semua riwayat?')){localStorage.removeItem(SKEY);go('history')}">🗑 Hapus Semua Riwayat</button>
  <button class="btn-sec" style="margin-top:8px" onclick="go('welcome')">← Kembali</button>`;
}



// ── INIT ──
go('welcome');
</script>
</body>
</html>
