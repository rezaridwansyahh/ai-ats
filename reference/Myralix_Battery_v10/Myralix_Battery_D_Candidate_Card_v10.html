function normalizeAns(raw,qn){
  if(!raw&&raw!==0)return'';
  let s=String(raw).trim().toLowerCase().replace(/\s+/g,' ');
  s=s.replace(/rp\.?|rupiah|dolar|\$|kaki|cm|meter/g,'').trim();
  if(s.includes(','))return s.split(',').map(p=>p.trim()).sort().join(',');
  return s;
}
function checkAnswer(qn,userAns){

  return false;
}

function getRange(code, score) {
  // Special rules
  if(code === 'G'){return score <= 3 ? 'LOW' : score <= 7 ? 'MIDDLE' : 'HIGH';}

  if(code === 'S'){return score < 6 ? 'LOW' : 'HIGH';}
  if(code === 'V'){return score < 5 ? 'LOW' : 'HIGH';}
  if(code === 'A'){return score <= 5 ? 'LOW' : 'HIGH';}
  if(code === 'E'){return score <= 2 ? 'LOW' : score <= 6 ? 'MIDDLE' : 'HIGH';}
  // General: 0-3 LOW, 4-6 MIDDLE, 7-9 HIGH
  return score <= 3 ? 'LOW' : score <= 6 ? 'MIDDLE' : 'HIGH';
}

function loadSaved(){try{const d=JSON.parse(localStorage.getItem(SKEY)||'null');if(d&&d.profile){APP.profile=d.profile;APP.results=d.results||{};return true;}return false;}catch{return false;}}

// ── HELPERS ──
function rawToPercentile(raw,max){const r=raw/max*100;if(r>=95)return 99;if(r>=85)return 92;if(r>=75)return 84;if(r>=65)return 75;if(r>=55)return 63;if(r>=45)return 50;if(r>=38)return 40;if(r>=30)return 30;if(r>=22)return 20;if(r>=15)return 12;if(r>=8)return 6;return 3;}
function pctToScore10(pct){return Math.max(1,Math.min(10,Math.round(pct/10)));}
function getVerdict(s){if(s>=7)return{v:'pass',label:'LOLOS',emoji:'✅',color:'#15803D',bg:'#F0FDF4',br:'#16A34A'};if(s>=5)return{v:'warn',label:'PERTIMBANGKAN',emoji:'⚠️',color:'#92400E',bg:'#FFFBEB',br:'#D97706'};return{v:'fail',label:'TIDAK LOLOS',emoji:'❌',color:'#991B1B',bg:'#FFF1F2',br:'#DC2626'};}
function getGrade(pct){if(pct>=90)return{g:'A',l:'Sangat Tinggi',c:'#059669',bg:'#ECFDF5'};if(pct>=75)return{g:'B',l:'Tinggi',c:'#0369A1',bg:'#EFF6FF'};if(pct>=26)return{g:'C',l:'Rata-rata',c:'#D97706',bg:'#FFFBEB'};if(pct>=11)return{g:'D',l:'Rendah',c:'#DC2626',bg:'#FEF2F2'};return{g:'E',l:'Sangat Rendah',c:'#991B1B',bg:'#FFF1F2'};}
function getIQ(raw){return IQ_TABLE[Math.min(Math.max(raw,0),50)]||90;}
function getIQClass(iq){for(const c of IQ_CLASSES){if(iq>=c.min)return c;}return IQ_CLASSES[IQ_CLASSES.length-1];}
function fmtTime(s){const m=Math.floor(s/60),ss=s%60;return`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function s10ToLabel(s){if(s>=9)return'Sangat Tinggi';if(s>=7)return'Tinggi';if(s>=5)return'Rata-rata';if(s>=3)return'Rendah';return'Sangat Rendah';}

// ── NAVIGATION ──
function goTo(screen){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timer-bar').className='timer-bar';
  APP.screen=screen;renderNav();
  const app=document.getElementById('app');app.className='wrap anim';app.innerHTML='';
  try{
    switch(screen){
      case'setup':      app.innerHTML=renderSetup();break;
      case'overview':   app.innerHTML=renderOverview();break;
      case'tk_intro':   app.innerHTML=renderIntro('tk');break;
      case'tk':         startTK();break;
      case'sjt_intro':  app.innerHTML=renderIntro('sjt');break;
      case'sjt':        startSJT();break;
      case'pf_intro':   app.innerHTML=renderIntro('pf');break;
      case'pf':         app.innerHTML=render16PF();break;
      case'msdt_intro': app.innerHTML=renderIntro('msdt');break;
      case'msdt':       app.innerHTML=renderMSDT();break;
      case'papil_intro':app.innerHTML=renderIntro('papil');break;
      case'papil':      app.innerHTML=renderPAPIL();break;
      case'complete':   app.innerHTML=renderComplete();break;
    }
  }catch(e){app.innerHTML=`<div style="padding:28px;background:#FEF2F2;border-radius:12px;color:#991B1B"><b>Error:</b> ${e.message}<br><small>${e.stack||''}</small><br><button onclick="goTo('overview')" style="margin-top:12px;padding:8px 16px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer">← Kembali</button></div>`;}
  window.scrollTo(0,0);
}
function renderNav(){
  const dots=document.getElementById('nav-dots');if(!dots)return;
  const done=new Set(Object.keys(APP.results));
  const activeIdx=TESTS.indexOf(APP.screen.replace(/_intro$/,''));
  dots.innerHTML=TESTS.map((t,i)=>`<div class="${done.has(t)?'ndot done':i===activeIdx?'ndot active':'ndot'}" title="Tes ${i+1}"></div>`).join('');
  const repBtn=document.getElementById('nav-report-btn');
  if(repBtn)repBtn.style.display=TESTS.every(t=>done.has(t))?'inline-flex':'none';
}

function startTK(){const phase=TK_ORDER_D.find(k=>!APP.tk.done[k])||'GI';APP.tk.phase=phase;APP.tk.curQ=0;showSubIntro(phase);}

function datPick(code,i,k){APP.tk.answers[code][i]=k;document.getElementById('app').innerHTML=renderDATSub(code);}
function datPrev(code){if(APP.tk.curQ>0){APP.tk.curQ--;document.getElementById('app').innerHTML=renderDATSub(code);}}
function datNext(code){if(APP.tk.curQ<SUBS[code].items-1){APP.tk.curQ++;document.getElementById('app').innerHTML=renderDATSub(code);}}
function datGoQ(code,i){APP.tk.curQ=i;document.getElementById('app').innerHTML=renderDATSub(code);}
function finishTKSub(){
  const code=APP.tk.phase;
  const n=code==='GI'?Object.values(APP.tk.answers.GI).filter(v=>v!=null&&v!=='').length:APP.tk.answers[code].filter(a=>a!==null).length;
  if(confirm(`Selesaikan subtes ${code}?\n\nTerjawab: ${n}/${SUBS[code].items} soal.\nWaktu tersisa: ${fmtTime(APP.tk.timeLeft)}`)){
    clearInterval(timerInt);timerInt=null;document.getElementById('timer-bar').className='timer-bar';
    scoreTKSub(code);showSubDone(code);
  }
}
function scoreTKSub(code){
  const s=SUBS[code];let ok=0;
  if(code==='GI'){for(const q of GI_QS){if(checkAnswer(q.n,APP.tk.answers.GI[q.n]||''))ok++;}}
  else{const qs=QS_MAP[code];APP.tk.answers[code].forEach((ans,idx)=>{const q=qs[idx];if(q&&ans===q.a)ok++;});}
  const pct=rawToPercentile(ok,s.items),score10=pctToScore10(pct),grade=getGrade(pct),verdict=getVerdict(score10);
  const res={ok,items:s.items,pct,score10,g:grade.g,label:grade.l,verdict:verdict.v};
  if(code==='GI'){res.iq=getIQ(ok);res.iqCls=getIQClass(res.iq);}
  APP.tk.done[code]=res;
}

  const idx=TK_ORDER_D.indexOf(code),isLast=idx===TK_ORDER_D.length-1,nextCode=TK_ORDER_D[idx+1];
  document.getElementById('app').innerHTML=`

    ${isLast?`<button class="btn-main" style="max-width:280px;margin:0 auto" onclick="submitTK()">Lanjut →</button>`
    :`<div style="background:${SUBS[nextCode].bg};border-radius:var(--rs);padding:12px 16px;margin-bottom:16px;font-size:12px;color:${SUBS[nextCode].color}">Subtes berikutnya &mdash; ${SUBS[nextCode].items} soal · ${SUBS[nextCode].time/60} menit</div><button class="btn-main" style="max-width:280px;margin:0 auto" onclick="showSubIntro('${nextCode}')">Mulai Subtes Berikutnya →</button>`}
    <div style="margin-top:10px"><button onclick="goTo('overview')" class="btn-sec">← Kembali ke Daftar</button></div>
  </div>`;
}
function submitTK(){
  const sub=APP.tk.done;
  // Normalize weights for 4 subtests (no KA): GI×0.30 + PV+KN+PA×0.175, total 0.825 → normalize
  const rawComp=TK_ORDER_D.reduce((s,k)=>s+(sub[k]?.score10||0)*SUBS[k].weight,0);
  const sumWeights=TK_ORDER_D.reduce((s,k)=>s+SUBS[k].weight,0);
  const composite=Math.round(rawComp/sumWeights*10)/10;
  const compVerdict=getVerdict(Math.round(composite));
  APP.results.tk={sub,composite,compVerdict:compVerdict.v,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  save();renderTestDone(1,'Tes 1 — Kemampuan Kognitif','sjt_intro');
}

  clearInterval(timerInt);timerInt=null;document.getElementById('timer-bar').className='timer-bar';
  const compScores={KK:0,KOM:0,MK:0,OH:0,AD:0,IE:0};let totalScore=0;
  APP.sjt.answers.forEach((chosen,i)=>{if(chosen===null||chosen===undefined)return;const q=SJT_QS[i],opt=q.opts[chosen];if(!opt)return;compScores[q.comp]+=opt.s;totalScore+=opt.s;});
  const compPct={};for(const[k,v]of Object.entries(compScores))compPct[k]=Math.round(v/COMPS[k].maxScore*100);
  const overallPct=Math.round(totalScore/COMP_TOTAL_MAX*100);
  const sortedComps=Object.entries(compPct).sort((a,b)=>b[1]-a[1]);
  const topComp=sortedComps[0][0];
  let profile;if(overallPct>=78)profile='BJ';else if(overallPct>=58){if(['KK','OH'].includes(topComp))profile='EK';else if(['KOM','MK'].includes(topComp))profile='KL';else profile='AE';}else profile='BK';
  const score10=pctToScore10(overallPct);
  APP.results.sjt={compScores,compPct,totalScore,overallPct,score10,verdict:getVerdict(score10).v,profile,sortedComps,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  save();renderTestDone(2,'Tes 2 — Penilaian Situasional','pf_intro');
}

// ══════ 16PF — AUTO-ADVANCE ON PICK (a/b/c) ══════
function render16PF(){
  const i=APP.pf.curQ,q=PF_QS[i],key=KEY[i+1],ans=APP.pf.answers[i];
  const pct=Math.round(i/105*100),factorCode=key[0],fp=FACTORS[factorCode]||{color:'#0369A1',bg:'#EFF6FF',nameID:factorCode};
  const tabWarn='';
  const opts=q.o.map((opt,oi)=>{const letter=['a','b','c'][oi];const isSel=ans===letter;
    return`<div class="pf-choice${isSel?' sel':''}" onclick="pfPick('${letter}')"><div class="pf-let" style="${isSel?`background:${fp.color||'#7C3AED'};border-color:${fp.color||'#7C3AED'};color:#fff`:`color:${fp.color||'#7C3AED'}`}">${letter}</div><div class="pf-txt">${esc(opt)}</div></div>`;
  }).join('');
  const dots=Array.from({length:105},(_,di)=>{let cls='qd';if(di===i)cls+=' cur';else if(APP.pf.answers[di]!==null)cls+=' done';return`<div class="${cls}" onclick="pfJump(${di})" title="${di+1}"></div>`;}).join('');
  return`
  <div class="q-bar"><div class="q-bar-inner"><span class="q-num-b" style="background:${fp.bg||'#EFF6FF'};color:${fp.color||'#7C3AED'}">${i+1} / 105</span><div class="q-track"><div class="q-fill" style="width:${pct}%;background:${fp.color||'#7C3AED'}"></div></div><span class="q-pct">${pct}%</span></div></div>
  ${tabWarn}
  <div class="q-card">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:${fp.bg||'#EFF6FF'};color:${fp.color||'#7C3AED'};font-family:'Playfair Display',serif;font-size:13px;font-weight:700;margin-bottom:12px">${i+1}</div>
    <div style="font-size:12px;color:var(--slate-md);margin-bottom:12px;padding:8px 12px;background:${fp.bg||'#EFF6FF'};border-radius:var(--rs)"><strong>Petunjuk:</strong> Pilih satu pilihan yang paling mencerminkan diri Anda.</div>
    <div style="font-size:15px;line-height:1.7;color:var(--slate);margin-bottom:14px;font-weight:500">${esc(q.s)}</div>
    ${opts}
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:8px">${i+1} dari 105 · Menjawab otomatis lanjut</div>
    <div class="q-foot"><button class="btn-prev" onclick="pfPrev()" ${i===0?'disabled':''}>← Sebelumnya</button><div style="flex:1"></div>${i===104?`<button class="btn-next" onclick="submit16PF()">Lihat Hasil →</button>`:ans!==null?`<button class="btn-next" onclick="pfNext()">Selanjutnya →</button>`:`<button class="btn-next" disabled>Selanjutnya →</button>`}</div>
  </div>`;
}
// AUTO-ADVANCE: pick → set → advance (Battery A pattern)
function pfPick(v){const i=APP.pf.curQ;APP.pf.answers[i]=v;if(i<104){APP.pf.curQ++;document.getElementById('app').innerHTML=render16PF();}else submit16PF();}
function pfNext(){if(APP.pf.curQ<104){APP.pf.curQ++;document.getElementById('app').innerHTML=render16PF();}}
function pfPrev(){if(APP.pf.curQ>0){APP.pf.curQ--;document.getElementById('app').innerHTML=render16PF();}}
function pfJump(i){APP.pf.curQ=i;document.getElementById('app').innerHTML=render16PF();}
function submit16PF(){
  const raw={};Object.keys(FACTORS).forEach(f=>{raw[f]=0;});
  APP.pf.answers.forEach((ans,i)=>{if(!ans)return;const k=KEY[i+1];const factor=k[0];
    if(k.length===3){if(ans==='a')raw[factor]+=k[1];else if(ans==='b')raw[factor]+=1;else if(ans==='c')raw[factor]+=k[2];}
    else{if(ans===k[1])raw[factor]+=2;else if(ans==='b'&&k[1]!=='b')raw[factor]+=1;}
  });
  // v4 fix: per-factor max raw score (was hardcoded mx=12 for non-B → capped sten range for many factors).
  // Values derived from actual KEY definitions: sum of Math.max(a_score,c_score,1) per item, or 2 per B-letter item.
  const FACTOR_MAX={A:14,B:18,C:16,E:12,F:16,G:10,H:14,I:8,L:14,M:16,N:14,O:8,Q1:14,Q2:14,Q3:12,Q4:10};
  const std={};Object.keys(FACTORS).forEach(f=>{std[f]=Math.max(1,Math.min(10,Math.round(raw[f]/FACTOR_MAX[f]*10)));});
  APP.results.pf={raw,std,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  
  save();renderTestDone(3,'Tes 3 — Kepribadian Komprehensif','msdt_intro');
}

// ══════ MSDT — AUTO-ADVANCE ON PICK ══════
function renderMSDT(){
  const i=APP.msdt.curQ,q=MSDT_QS[i],ans=APP.msdt.answers[i],total=MSDT_QS.length;
  const pct=Math.round(i/total*100),answered=APP.msdt.answers.filter(a=>a!==null).length;
  const tabWarn='';
  const dots=Array.from({length:total},(_,di)=>{let cls='qd';if(di===i)cls+=' cur';else if(APP.msdt.answers[di]!==null)cls+=' done';return`<div class="${cls}" onclick="msdtJump(${di})" title="${di+1}"></div>`;}).join('');
  return`
  <div class="q-bar"><div class="q-bar-inner"><span class="q-num-b" style="background:#FDF2F8;color:#DB2777">${i+1} / ${total}</span><div class="q-track"><div class="q-fill" style="width:${pct}%;background:#DB2777"></div></div><span class="q-pct">${answered}/${total} dijawab</span></div></div>
  ${tabWarn}
  <div class="q-card">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:#FDF2F8;color:#DB2777;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;margin-bottom:12px">${i+1}</div>
    <div style="font-size:12px;color:var(--slate-md);margin-bottom:12px;padding:8px 12px;background:#FDF2F8;border-radius:var(--rs)"><strong>Petunjuk:</strong> Pilih pernyataan yang paling mencerminkan gaya kepemimpinan Anda — jawaban langsung lanjut otomatis.</div>
    <div class="msdt-choice${ans==='A'?' sel':''}" onclick="msdtPick('A')"><div class="msdt-let" style="${ans==='A'?'background:#DB2777;border-color:#DB2777;color:#fff':'color:#DB2777'}">A</div><div class="msdt-txt">${esc(q.a)}</div></div>
    <div class="msdt-choice${ans==='B'?' sel':''}" onclick="msdtPick('B')"><div class="msdt-let" style="${ans==='B'?'background:#DB2777;border-color:#DB2777;color:#fff':'color:#DB2777'}">B</div><div class="msdt-txt">${esc(q.b)}</div></div>
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:8px">${i+1} dari ${total} · Menjawab otomatis lanjut</div>
    <div class="q-foot"><button class="btn-prev" onclick="msdtPrev()" ${i===0?'disabled':''}>← Sebelumnya</button><div style="flex:1"></div>${i===total-1?`<button class="btn-next" onclick="submitMSDT()">Lihat Hasil →</button>`:ans!==null?`<button class="btn-next" onclick="msdtNext()">Selanjutnya →</button>`:`<button class="btn-next" disabled>Selanjutnya →</button>`}</div>
  </div>`;
}
// AUTO-ADVANCE
function msdtPick(v){const i=APP.msdt.curQ;APP.msdt.answers[i]=v;const total=MSDT_QS.length;if(i<total-1){APP.msdt.curQ++;document.getElementById('app').innerHTML=renderMSDT();}else submitMSDT();}
function msdtNext(){const tot=MSDT_QS.length;if(APP.msdt.curQ<tot-1){APP.msdt.curQ++;document.getElementById('app').innerHTML=renderMSDT();}}
function msdtPrev(){if(APP.msdt.curQ>0){APP.msdt.curQ--;document.getElementById('app').innerHTML=renderMSDT();}}
function msdtJump(i){APP.msdt.curQ=i;document.getElementById('app').innerHTML=renderMSDT();}
function submitMSDT(){
  const raw={Ds:0,Mi:0,Au:0,Co:0,Bu:0,Dv:0,Ba:0,E:0};
  APP.msdt.answers.forEach((ans,i)=>{const q=MSDT_QS[i];if(ans==='A')raw[q.sa]++;else if(ans==='B')raw[q.sb]++;});
  const total=Object.values(raw).reduce((a,b)=>a+b,0)||1;
  const TO_raw=TO_STYLES.reduce((sum,s)=>sum+raw[s],0);
  const RO_raw=RO_STYLES.reduce((sum,s)=>sum+raw[s],0);
  const E_raw=E_STYLES.reduce((sum,s)=>sum+raw[s],0);
  // v8 fix: per-family maximum as divisor (was fixed /32 which overflowed for strong candidates).
  // Derived from audit of MSDT_QS item coverage: TO={Au:20,Ba:24,Co:6,E:15}=65, RO={Mi:16,Dv:18,Co:6,E:15}=55, E={Bu:16,Ba:24,Dv:18,E:15}=73.
  const TO_MAX=65,RO_MAX=55,E_MAX=73;
  const TO=Math.min(100,Math.round(TO_raw/TO_MAX*100)),RO=Math.min(100,Math.round(RO_raw/RO_MAX*100)),E=Math.min(100,Math.round(E_raw/E_MAX*100));
  const dominant=Object.entries(raw).sort((a,b)=>b[1]-a[1])[0][0];
  const effectPct=Math.round((TO+RO)/2);
  const score10=pctToScore10(effectPct);
  APP.results.msdt={raw,TO,RO,E,dominant,effectPct,score10,verdict:getVerdict(score10).v,styleInfo:STYLES[dominant],date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  save();renderTestDone(4,'Tes 4 — Gaya Kepemimpinan','papil_intro');
}

// ══════ PAPI-L — AUTO-ADVANCE ON PICK ══════
function renderPAPIL(){
  const i=APP.papil.curQ,q=PAPI_LD_QS[i],key=SCORING_KEY[i],ans=APP.papil.answers[i];
  const pct=Math.round(i/90*100),asp=ASPECTS.find(a=>a.dims.includes(key[1]))||ASPECTS[0];
  const aspColor=ASPECT_COLORS[asp.id]||'#0891B2';
  const tabWarn='';
  const dots=Array.from({length:90},(_,di)=>{let cls='qd';if(di===i)cls+=' cur';else if(APP.papil.answers[di]!==null)cls+=' done';return`<div class="${cls}" onclick="papilJump(${di})" title="${di+1}"></div>`;}).join('');
  return`
  <div class="q-bar"><div class="q-bar-inner"><span class="q-num-b" style="background:${aspColor}15;color:${aspColor}">${i+1} / 90</span><div class="q-track"><div class="q-fill" style="width:${pct}%;background:${aspColor}"></div></div><span class="q-pct">${pct}%</span></div></div>
  ${tabWarn}
  <div class="q-card">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:${aspColor}15;color:${aspColor};font-family:'Playfair Display',serif;font-size:13px;font-weight:700;margin-bottom:12px">${i+1}</div>
    <div style="font-size:12px;color:var(--slate-md);margin-bottom:12px;padding:8px 12px;background:${aspColor}0D;border-radius:var(--rs)"><strong>Petunjuk:</strong> Pilih pernyataan yang paling mencerminkan kepemimpinan Anda — jawaban langsung lanjut otomatis.</div>
    <div class="fc-pair">
      <div class="fc-choice${ans==='A'?' sel':''}" onclick="papilPick('A')"><div class="fc-let" style="${ans==='A'?`background:${aspColor};border-color:${aspColor};color:#fff`:`color:${aspColor}`}">a</div><div class="fc-txt">${esc(q.a)}</div></div>
      <div class="fc-choice${ans==='B'?' sel':''}" onclick="papilPick('B')"><div class="fc-let" style="${ans==='B'?`background:${aspColor};border-color:${aspColor};color:#fff`:`color:${aspColor}`}">b</div><div class="fc-txt">${esc(q.b)}</div></div>
    </div>
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:8px">${i+1} dari 90 · Menjawab otomatis lanjut</div>
    <div class="q-foot"><button class="btn-prev" onclick="papilPrev()" ${i===0?'disabled':''}>← Sebelumnya</button><div style="flex:1"></div>${i===89?`<button class="btn-next" onclick="submitPAPIL()">Lihat Hasil →</button>`:ans!==null?`<button class="btn-next" onclick="papilNext()">Selanjutnya →</button>`:`<button class="btn-next" disabled>Selanjutnya →</button>`}</div>
  </div>`;
}
// AUTO-ADVANCE
function papilPick(v){const i=APP.papil.curQ;APP.papil.answers[i]=v;if(i<89){APP.papil.curQ++;document.getElementById('app').innerHTML=renderPAPIL();}else submitPAPIL();}
function papilNext(){if(APP.papil.curQ<89){APP.papil.curQ++;document.getElementById('app').innerHTML=renderPAPIL();}}
function papilPrev(){if(APP.papil.curQ>0){APP.papil.curQ--;document.getElementById('app').innerHTML=renderPAPIL();}}
function papilJump(i){APP.papil.curQ=i;document.getElementById('app').innerHTML=renderPAPIL();}
function submitPAPIL(){
  const scores={};[...ROLE_DIMS,...NEED_DIMS].forEach(d=>{scores[d]=0;});
  APP.papil.answers.forEach((ans,i)=>{if(!ans)return;const key=SCORING_KEY[i];scores[ans==='A'?key[1]:key[2]]++;});
  const roleTotal=ROLE_DIMS.reduce((s,d)=>s+scores[d],0),needTotal=NEED_DIMS.reduce((s,d)=>s+scores[d],0);
  APP.results.papil={scores,roleTotal,needTotal,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  
  save();renderTestDone(5,'Tes 5 — Preferensi Kepemimpinan','complete');
}

    <div style="font-size:11px;color:#6B7280;text-align:center">Laporan hanya untuk rekruter — buka di browser yang sama</div>
  </div>`:''}
  <div class="card"><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-lt);margin-bottom:14px">Daftar Tes — ${doneCount} dari ${TESTS.length} Selesai</div>${checkItems}</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">

    ${!allDone?`<button onclick="goTo('${TESTS.find(t=>!done[t])}_intro')" class="btn-main" style="width:auto;padding:10px 20px">Lanjutkan Tes →</button>`:''}

}

document.addEventListener('visibilitychange',()=>{if(document.hidden&&['tk','sjt','pf','msdt','papil'].includes(APP.screen))APP.tabSwitches++;});

loadSaved();
