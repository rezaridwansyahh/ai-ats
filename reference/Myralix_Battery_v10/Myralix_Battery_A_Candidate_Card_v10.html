.qnav-dots{display:flex;flex-wrap:wrap;gap:3px}

.qd.done{background:var(--teal-lt);border-color:var(--teal)}

.plabel{display:flex;justify-content:space-between;font-size:11px;opacity:.8}
@media print{.navbar,.no-print{display:none!important}.wrap{padding:0}body{background:#fff}}

function computeScores(answers){
  const line1={D:0,I:0,S:0,C:0}; // Most / Adaptive
  const line2={D:0,I:0,S:0,C:0}; // Least / Natural (under pressure)
  answers.forEach((ans,gi)=>{
    const group=GROUPS[gi];
    if(ans.m!==null){
      const dim=group.options[ans.m].p;
      if(dim!=='*')line1[dim]++;
    }
    if(ans.l!==null){
      const dim=group.options[ans.l].k;
      if(dim!=='*')line2[dim]++;
    }
  });
  const line3={
    D:line1.D-line2.D,
    I:line1.I-line2.I,
    S:line1.S-line2.S,
    C:line1.C-line2.C
  };
  return{line1,line2,line3};
}
function getDominant(line3){
  const sorted=Object.entries(line3).sort((a,b)=>b[1]-a[1]);
  return sorted[0][0];
}
function getAdaptive(line1){
  const sorted=Object.entries(line1).sort((a,b)=>b[1]-a[1]);
  return sorted[0][0];
}
function getNatural(line2){
  const sorted=Object.entries(line2).sort((a,b)=>b[1]-a[1]);
  return sorted[0][0];
}
function pctToScore10(pct){return Math.max(1,Math.min(10,Math.round(pct/10)));};
function getVerdict(s10){
  if(s10>=7)return{v:'pass',label:'LOLOS',emoji:'✅',full:'REKOMENDASI: KUAT',color:'#15803D',bg:'#F0FDF4',br:'#16A34A'};
  if(s10>=5)return{v:'warn',label:'PERTIMBANGKAN',emoji:'⚠️',full:'PERLU EVALUASI LEBIH LANJUT',color:'#92400E',bg:'#FFFBEB',br:'#D97706'};
  return{v:'fail',label:'TIDAK LOLOS',emoji:'❌',full:'TIDAK DIREKOMENDASIKAN',color:'#991B1B',bg:'#FFF1F2',br:'#DC2626'};
}

// ── HELPERS ──
function rawToPercentile(raw,max){const r=raw/max*100;if(r>=95)return 99;if(r>=85)return 92;if(r>=75)return 84;if(r>=65)return 75;if(r>=55)return 63;if(r>=45)return 50;if(r>=38)return 40;if(r>=30)return 30;if(r>=22)return 20;if(r>=15)return 12;if(r>=8)return 6;return 3;}
function pctToScore10(pct){return Math.max(1,Math.min(10,Math.round(pct/10)));}
function getVerdict(s){if(s>=7)return{v:'pass',label:'LOLOS',emoji:'✅',color:'#15803D',bg:'#F0FDF4',br:'#16A34A'};if(s>=5)return{v:'warn',label:'PERTIMBANGKAN',emoji:'⚠️',color:'#92400E',bg:'#FFFBEB',br:'#D97706'};return{v:'fail',label:'TIDAK LOLOS',emoji:'❌',color:'#991B1B',bg:'#FFF1F2',br:'#DC2626'};}
function getGrade(pct){if(pct>=90)return{g:'A',l:'Sangat Tinggi',c:'#059669',bg:'#ECFDF5'};if(pct>=75)return{g:'B',l:'Tinggi',c:'#0369A1',bg:'#EFF6FF'};if(pct>=26)return{g:'C',l:'Rata-rata',c:'#D97706',bg:'#FFFBEB'};if(pct>=11)return{g:'D',l:'Rendah',c:'#DC2626',bg:'#FEF2F2'};return{g:'E',l:'Sangat Rendah',c:'#991B1B',bg:'#FFF1F2'};}
function getIQ(raw){return IQ_TABLE[Math.min(Math.max(raw,0),50)]||90;}
function getIQClass(iq){for(const c of IQ_CLASSES){if(iq>=c.min)return c;}return IQ_CLASSES[IQ_CLASSES.length-1];}
function fmtTime(s){const m=Math.floor(s/60),ss=s%60;return`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function goTo(screen){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timer-bar').className='timer-bar';
  APP.screen=screen;renderNav();
  const app=document.getElementById('app');app.className='wrap anim';app.innerHTML='';
  try{
    switch(screen){
      case'setup':         app.innerHTML=renderSetup();break;
      case'overview':      app.innerHTML=renderOverview();break;
      case'tk_intro':      app.innerHTML=renderIntro('tk');break;
      case'tk':            startTK();break;
      case'bigfive_intro': app.innerHTML=renderIntro('bigfive');break;
      case'bigfive':       app.innerHTML=renderBigFive();break;
      case'disc_intro':    app.innerHTML=renderIntro('disc');break;
      case'disc':          app.innerHTML=renderDISC();break;
      case'holland_intro': app.innerHTML=renderIntro('holland');break;
      case'holland':       app.innerHTML=renderHolland();break;
      case'complete':      app.innerHTML=renderComplete();break;
    }
  }catch(e){app.innerHTML=`<div style="padding:28px;background:#FEF2F2;border-radius:12px;color:#991B1B"><b>Error:</b> ${e.message}<br><small>${e.stack||''}</small><br><button onclick="goTo('overview')" style="margin-top:12px;padding:8px 16px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer">← Kembali</button></div>`;}
  window.scrollTo(0,0);
}
function renderNav(){
  const dots=document.getElementById('nav-dots');if(!dots)return;
  const done=new Set(Object.keys(APP.results));
  const activeIdx=TESTS.indexOf(APP.screen.replace(/_intro$/,''));
  dots.innerHTML=TESTS.map((t,i)=>`<div class="${done.has(t)?'ndot done':i===activeIdx?'ndot active':'ndot'}" title="Tes ${i+1}"></div>`).join('');
  const repBtn=document.getElementById('nav-report-btn');
  if(repBtn)repBtn.style.display=TESTS.every(t=>done.has(t))?'inline-flex':'none';
}

function startTK(){const phase=TK_ORDER_A.find(k=>!APP.tk.done[k])||'GI';APP.tk.phase=phase;APP.tk.curQ=0;showSubIntro(phase);}

}
function updateTKTimer(){
  const s=SUBS[APP.tk.phase],left=APP.tk.timeLeft,total=APP.tk.totalTime,pct=Math.max(0,left/total*100),warn=left<=60;

  if(badge){badge.textContent=s.code;badge.style.background=s.color+'33';badge.style.color=s.color;}

function kaGoQ(i){APP.tk.curQ=i;document.getElementById('app').innerHTML=renderKA();}
function finishTKSub(){
  const code=APP.tk.phase;
  const n=code==='GI'?Object.values(APP.tk.answers.GI).filter(v=>v!=null&&v!=='').length:APP.tk.answers.KA.filter(a=>a!==null).length;
  if(confirm(`Selesaikan subtes ${code}?\n\nTerjawab: ${n}/${SUBS[code].items}\nWaktu tersisa: ${fmtTime(APP.tk.timeLeft)}`)){
    clearInterval(timerInt);timerInt=null;document.getElementById('timer-bar').className='timer-bar';
    scoreTKSub(code);showSubDone(code);
  }

function scoreTKSub(code){
  const s=SUBS[code];let ok=0;
  if(code==='GI'){for(const q of GI_QS){if(checkAnswer(q.n,APP.tk.answers.GI[q.n]||''))ok++;}}
  else{const qs=QS_MAP[code];APP.tk.answers.KA.forEach((ans,idx)=>{const q=qs[idx];if(q&&ans===q.a)ok++;});}
  const pct=rawToPercentile(ok,s.items),score10=pctToScore10(pct),grade=getGrade(pct),verdict=getVerdict(score10);
  const res={ok,items:s.items,pct,score10,g:grade.g,label:grade.l,verdict:verdict.v};
  if(code==='GI'){res.iq=getIQ(ok);res.iqCls=getIQClass(res.iq);}
  APP.tk.done[code]=res;
}

  const idx=TK_ORDER_A.indexOf(code),isLast=idx===TK_ORDER_A.length-1,nextCode=TK_ORDER_A[idx+1];

    <div style="margin-top:10px"><button onclick="goTo('overview')" class="btn-sec">← Kembali ke Daftar</button></div>
  </div>`;
}
function submitTK(){
  const sub=APP.tk.done;
  const rawComp=TK_ORDER_A.reduce((s,k)=>s+(sub[k]?.score10||0)*SUBS[k].weight,0);
  const sumW=TK_ORDER_A.reduce((s,k)=>s+SUBS[k].weight,0);
  const composite=Math.round(rawComp/sumW*10)/10;
  const compVerdict=getVerdict(Math.round(composite));
  APP.results.tk={sub,composite,compVerdict:compVerdict.v,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  save();renderTestDone(1,'Tes 1 — Kemampuan Kognitif','bigfive_intro');
}

  const i=APP.bigfive.curQ,item=BF_ITEMS[i],trait=item[1],rev=item[2];
  const tc=TRAITS[trait],ans=APP.bigfive.answers[i];
  const pct=Math.round(i/44*100);
  const tabWarn='';
  const dots=BF_ITEMS.map((_,di)=>{let cls='qd';if(di===i)cls+=' cur';else if(APP.bigfive.answers[di]!==null)cls+=' done';return`<div class="${cls}" onclick="bfJump(${di})" title="${di+1}"></div>`;}).join('');
  const likertBtns=[1,2,3,4,5].map(v=>`<button class="likert-btn${ans===v?' sel':''}" onclick="bfPick(${v})">${v}</button>`).join('');
  return`
  <div class="q-bar"><div class="q-bar-inner"><span class="q-num-b" style="background:${tc.bg};color:${tc.color}">${i+1} / 44</span><div class="q-track"><div class="q-fill" style="width:${pct}%;background:${tc.color}"></div></div><span class="q-pct">${pct}%</span></div></div>
  ${tabWarn}
  <div class="q-card">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:${tc.bg};color:${tc.color};font-family:'Playfair Display',serif;font-size:13px;font-weight:700;margin-bottom:12px">${i+1}</div>
    <div style="font-size:12px;color:var(--slate-md);margin-bottom:12px;padding:8px 12px;background:${tc.bg};border-radius:var(--rs)"><strong>Petunjuk:</strong> Seberapa sesuai pernyataan ini dengan diri Anda? Menjawab otomatis lanjut.</div>
    <div style="font-size:13px;color:var(--slate-md);margin-bottom:4px">Saya adalah orang yang …</div>
    <div style="font-size:16px;font-weight:600;color:var(--navy);margin-bottom:18px;line-height:1.5">${esc(BF_QS[i])}</div>
    <div class="likert-wrap">
      <div class="likert-labels"><span class="likert-label">Sangat<br>Tidak Sesuai</span><span class="likert-label">Tidak<br>Sesuai</span><span class="likert-label">Netral</span><span class="likert-label">Sesuai</span><span class="likert-label">Sangat<br>Sesuai</span></div>
      <div class="likert-row">${likertBtns}</div>
    </div>
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:8px">${i+1} dari 44 · Menjawab otomatis lanjut</div>
    <div class="q-foot"><button class="btn-prev" onclick="bfPrev()" ${i===0?'disabled':''}>← Sebelumnya</button><div style="flex:1"></div>${i===43?`<button class="btn-next" onclick="submitBigFive()">Lihat Hasil →</button>`:ans!==null?`<button class="btn-next" onclick="bfNext()">Selanjutnya →</button>`:`<button class="btn-next" disabled>Selanjutnya →</button>`}</div>
  </div>`;
}
// AUTO-ADVANCE: pick → set → curQ++ → re-render (Battery C pattern)
function bfPick(v){const i=APP.bigfive.curQ;APP.bigfive.answers[i]=v;if(i<43){APP.bigfive.curQ++;document.getElementById('app').innerHTML=renderBigFive();}else submitBigFive();}
function bfNext(){if(APP.bigfive.curQ<43){APP.bigfive.curQ++;document.getElementById('app').innerHTML=renderBigFive();}}
function bfPrev(){if(APP.bigfive.curQ>0){APP.bigfive.curQ--;document.getElementById('app').innerHTML=renderBigFive();}}
function bfJump(i){APP.bigfive.curQ=i;document.getElementById('app').innerHTML=renderBigFive();}
function submitBigFive(){
  const raw={E:0,A:0,C:0,N:0,O:0};
  APP.bigfive.answers.forEach((ans,i)=>{if(ans===null)return;const[,trait,rev]=BF_ITEMS[i];raw[trait]+=(rev?(6-ans):ans);});
  const pct={},lvl={};
  Object.keys(raw).forEach(t=>{
    // v8 fix: rebase pct from "% of max" to "% of Likert range" so all-neutral answers = 50% (not 60%).
    // Items per trait: E=8, A=9, C=9, N=8, O=10. Min raw = items×1, max raw = items×5. Normalized: (raw - items) / (items×4) × 100.
    const items=TRAIT_MAX[t]/5;
    pct[t]=parseFloat(((raw[t]-items)/(items*4)*100).toFixed(1));
    // Recalibrated thresholds to match new 0-100% scale — old 75%/45% on flawed scale ≈ new 65%/35% (Likert mean ≥ 3.6 / ≥ 2.4).
    lvl[t]=pct[t]>=65?'Tinggi':pct[t]>=35?'Sedang':'Rendah';
  });
  APP.results.bigfive={raw,pct,lvl,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  
  save();renderTestDone(2,'Tes 2 — Kepribadian','disc_intro');
}

// ══════ DISC — AUTO-ADVANCE WHEN M+L BOTH COMPLETE ══════
function renderDISC(){
  const gi=APP.disc.curQ,group=GROUPS[gi],ans=APP.disc.answers[gi];
  const pct=Math.round(gi/24*100),answered=APP.disc.answers.filter(a=>a.m!==null&&a.l!==null&&a.m!==a.l).length;
  const complete=(ans.m!==null&&ans.l!==null&&ans.m!==ans.l);
  const tabWarn='';
  const dots=Array.from({length:24},(_,di)=>{const a=APP.disc.answers[di];let cls='qd';if(di===gi)cls+=' cur';else if(a.m!==null&&a.l!==null&&a.m!==a.l)cls+=' done';return`<div class="${cls}" onclick="discJump(${di})" title="${di+1}"></div>`;}).join('');
  const rows=group.options.map((opt,i)=>{
    const isM=ans.m===i,isL=ans.l===i;
    let cls='disc-opt-row';
    if(isM&&isL)cls+=' sel-m sel-l';else if(isM)cls+=' sel-m';else if(isL)cls+=' sel-l';
    return`<div class="${cls}">
      <div class="disc-opt-txt"><strong style="color:var(--slate-lt);margin-right:4px">${['A','B','C','D'][i]}.</strong>${esc(opt.t)}</div>
      <div class="disc-btns">
        <button class="disc-btn-m${isM?' active':''}" onclick="discPickM(${gi},${i})" title="Paling sesuai">M</button>
        <button class="disc-btn-l${isL?' active':''}" onclick="discPickL(${gi},${i})" title="Paling tidak sesuai">L</button>
      </div>
    </div>`;
  }).join('');
  return`
  <div class="q-bar"><div class="q-bar-inner"><span class="q-num-b" style="background:#EFF6FF;color:#0369A1">${gi+1} / 24</span><div class="q-track"><div class="q-fill" style="width:${pct}%;background:#0369A1"></div></div><span class="q-pct">${answered}/24 selesai</span></div></div>
  ${tabWarn}
  <div class="disc-group">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:32px;height:32px;border-radius:50%;background:#EFF6FF;color:#0369A1;display:grid;place-items:center;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;flex-shrink:0">${gi+1}</div>
      <span style="font-size:13px;font-weight:700;color:#0369A1">Kelompok ${gi+1} dari 24</span>
    </div>
    <div class="disc-legend"><span class="disc-leg-m">M = Paling Sesuai dengan Anda</span><span class="disc-leg-l">L = Paling Tidak Sesuai</span></div>
    <div class="disc-opts">${rows}</div>
    ${ans.m!==null&&ans.l!==null&&ans.m===ans.l?`<div style="color:#DC2626;font-size:12px;margin-bottom:8px">⚠️ Pilihan M dan L tidak boleh sama.</div>`:''}
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:8px">Pilih M dan L yang berbeda — otomatis lanjut saat keduanya dipilih</div>
    <div class="q-foot"><button class="btn-prev" onclick="discPrev()" ${gi===0?'disabled':''}>← Sebelumnya</button><div style="flex:1"></div>${gi===23&&complete?`<button class="btn-next" onclick="submitDISC()">Lihat Hasil →</button>`:complete?`<button class="btn-next" onclick="discNext()">Selanjutnya →</button>`:`<button class="btn-next" disabled>Selanjutnya →</button>`}</div>
  </div>`;
}
// AUTO-ADVANCE: when both M and L selected (and different), advance after 180ms
function discPickM(gi,i){
  const ans=APP.disc.answers[gi];
  if(ans.m===i){ans.m=null;}else{ans.m=i;}
  document.getElementById('app').innerHTML=renderDISC();
  checkDiscAutoAdvance(gi);
}
function discPickL(gi,i){
  const ans=APP.disc.answers[gi];
  if(ans.l===i){ans.l=null;}else{ans.l=i;}
  document.getElementById('app').innerHTML=renderDISC();
  checkDiscAutoAdvance(gi);
}
function checkDiscAutoAdvance(gi){
  const ans=APP.disc.answers[gi];
  if(ans.m!==null&&ans.l!==null&&ans.m!==ans.l&&gi<23){
    setTimeout(()=>{APP.disc.curQ++;document.getElementById('app').innerHTML=renderDISC();},200);
  }
}
function discNext(){if(APP.disc.curQ<23){APP.disc.curQ++;document.getElementById('app').innerHTML=renderDISC();}}
function discPrev(){if(APP.disc.curQ>0){APP.disc.curQ--;document.getElementById('app').innerHTML=renderDISC();}}
function discJump(i){APP.disc.curQ=i;document.getElementById('app').innerHTML=renderDISC();}
function submitDISC(){
  const scores=computeScores(APP.disc.answers);
  const dominant=getDominant(scores.line1);
  const adaptive=getAdaptive(scores.line1);
  const natural=getNatural(scores.line2);
  APP.results.disc={scores,dominant,adaptive,natural,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  
  save();renderTestDone(3,'Tes 3 — Gaya Kerja','holland_intro');
}

// ══════ HOLLAND — AUTO-ADVANCE (Yes/No) ══════
function renderHolland(){
  const i=APP.holland.curQ,q=HOL_QS[i],ans=APP.holland.answers[i];
  const pct=Math.round(i/108*100),tc=HOL_TC[q.t];
  const tabWarn='';
  const dots=HOL_QS.map((_,di)=>{let cls='qd';if(di===i)cls+=' cur';else if(APP.holland.answers[di]!==null)cls+=' done';return`<div class="${cls}" onclick="holJump(${di})" title="${di+1}"></div>`;}).join('');
  return`
  <div class="q-bar"><div class="q-bar-inner"><span class="q-num-b" style="background:${tc.bg};color:${tc.color}">${i+1} / 108</span><div class="q-track"><div class="q-fill" style="width:${pct}%;background:${tc.color}"></div></div><span class="q-pct">${pct}%</span></div></div>
  ${tabWarn}
  <div class="q-card">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:${tc.bg};color:${tc.color};font-family:'Playfair Display',serif;font-size:13px;font-weight:700;margin-bottom:12px">${i+1}</div>
    <div style="font-size:16px;font-weight:600;color:var(--navy);margin-bottom:20px;line-height:1.6">${esc(q.q)}</div>
    <div class="hol-yn-row">
      <button class="hol-btn yes${ans===true?' sel':''}" onclick="holPick(true)">✓ Ya</button>
      <button class="hol-btn no${ans===false?' sel':''}" onclick="holPick(false)">✕ Tidak</button>
    </div>
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:8px">${i+1} dari 108 · Menjawab otomatis lanjut</div>
    <div class="q-foot"><button class="btn-prev" onclick="holPrev()" ${i===0?'disabled':''}>← Sebelumnya</button><div style="flex:1"></div>${i===107?`<button class="btn-next" onclick="submitHolland()">Lihat Hasil →</button>`:ans!==null?`<button class="btn-next" onclick="holNext()">Selanjutnya →</button>`:`<button class="btn-next" disabled>Selanjutnya →</button>`}</div>
  </div>`;
}
// AUTO-ADVANCE (Battery C pattern)
function holPick(v){const i=APP.holland.curQ;APP.holland.answers[i]=v;if(i<107){APP.holland.curQ++;document.getElementById('app').innerHTML=renderHolland();}else submitHolland();}
function holNext(){if(APP.holland.curQ<107){APP.holland.curQ++;document.getElementById('app').innerHTML=renderHolland();}}
function holPrev(){if(APP.holland.curQ>0){APP.holland.curQ--;document.getElementById('app').innerHTML=renderHolland();}}
function holJump(i){APP.holland.curQ=i;document.getElementById('app').innerHTML=renderHolland();}
function submitHolland(){
  const scores={R:0,I:0,A:0,S:0,E:0,C:0};
  APP.holland.answers.forEach((ans,i)=>{if(ans===true)scores[HOL_QS[i].t]++;});
  const ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const code3=ranked.slice(0,3).map(x=>x[0]).join('');
  const top1=ranked[0][0],top2=ranked[1][0];
  const combo2=top1+top2;
  const consistency=CONSISTENCY[combo2]||CONSISTENCY[top2+top1]||'Tidak Diketahui';
  const comboInfo=COMBOS[combo2]||COMBOS[top2+top1]||{title:'Profil Unik',jobs:'Beragam sesuai minat dominan'};
  APP.results.holland={scores,ranked,code3,consistency,comboInfo,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  save();renderTestDone(4,'Tes 4 — Minat Kerja','complete');
}

// ── SHARED TEST DONE ──
function renderTestDone(num,label,nextScreen){
  const isLast=num===4;
  document.getElementById('timer-bar').className='timer-bar';
  document.getElementById('app').innerHTML=`
  <div style="max-width:480px;margin:60px auto 0;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:#ECFDF5;border:3px solid #16A34A;display:inline-flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px">✅</div>
    <h2 style="font-size:22px;color:#15803D;margin-bottom:8px">${label} Selesai</h2>
    <p style="font-size:13px;color:var(--slate-md);line-height:1.7;margin-bottom:28px">Jawaban Anda telah direkam.<br>${isLast?'Seluruh rangkaian tes Battery A telah selesai.':'Lanjutkan ke tes berikutnya saat siap.'}</p>
    <button class="btn-main" style="max-width:280px;margin:0 auto" onclick="goTo('${nextScreen}')">${isLast?'Lihat Ringkasan Akhir →':'Lanjut ke Tes Berikutnya →'}</button>
    <div style="margin-top:12px"><button onclick="goTo('overview')" class="btn-sec">← Kembali ke Daftar</button></div>
  </div>`;
  renderNav();
}

// ── COMPLETE ──
function renderComplete(){
  const done=APP.results,allDone=TESTS.every(t=>done[t]),doneCount=Object.keys(done).length;
  const labels={tk:'Tes 1 — TK Kognitif (GI+KA)',bigfive:'Tes 2 — Kepribadian',disc:'Tes 3 — Gaya Kerja',holland:'Tes 4 — Minat Kerja'};
  const checkItems=TESTS.map((t,i)=>`<div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--rs);border:1.5px solid ${done[t]?'#BBF7D0':'var(--border)'};background:${done[t]?'#F0FDF4':'#FAFAFA'};margin-bottom:8px">
    <div style="width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:${done[t]?'20px':'14px'};font-weight:700;flex-shrink:0;background:${done[t]?'#16A34A':'var(--border)'};color:#fff">${done[t]?'✓':i+1}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:700;color:${done[t]?'#15803D':'var(--slate-lt)'}">${labels[t]}</div><div style="font-size:11px;color:${done[t]?'#4ADE80':'var(--slate-lt)'};margin-top:1px">${done[t]?'Selesai':'Belum dikerjakan'}</div></div>
    <div>${done[t]?'✅':'⭕'}</div>
  </div>`).join('');
  return`
  ${allDone?`<div style="background:linear-gradient(135deg,#ECFDF5,#F0FDF4);border:2px solid #16A34A;border-radius:var(--r);padding:28px;text-align:center;margin-bottom:16px">
    <div style="font-size:58px;margin-bottom:10px">🎉</div>
    <div style="font-family:'Playfair Display',serif;font-size:24px;color:#15803D;margin-bottom:6px">Semua Tes Selesai!</div>
    <div style="font-size:13px;color:var(--slate-md);line-height:1.65;margin-bottom:16px">Selamat ${APP.profile.name}! Seluruh rangkaian tes Battery A telah selesai.</div>
    <a href="Myralix_Battery_A_Laporan_Psikologis_v10.html" target="_blank" style="display:block;background:linear-gradient(135deg,#064E3B,#0A6E5C);color:#fff;padding:13px 20px;border-radius:var(--rs);font-size:14px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:8px">📊 Buka Laporan Psikologis (Rekruter) →</a>
    <div style="font-size:11px;color:#6B7280;text-align:center">Laporan hanya untuk rekruter — buka di browser yang sama</div>
  </div>`:''}
  <div class="card"><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-lt);margin-bottom:14px">Daftar Tes — ${doneCount} dari ${TESTS.length} Selesai</div>${checkItems}</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
    <button onclick="goTo('overview')" class="btn-sec">← Kembali ke Daftar</button>
    ${!allDone?`<button onclick="goTo('${TESTS.find(t=>!done[t])}_intro')" class="btn-main" style="width:auto;padding:10px 20px">Lanjutkan Tes →</button>`:''}
  </div>`;
}

// ── TAB / ANTI-CHEAT ──
document.addEventListener('visibilitychange',()=>{if(document.hidden&&['tk','bigfive','disc','holland'].includes(APP.screen))APP.tabSwitches++;});
document.addEventListener('contextmenu',e=>{if(APP.screen==='tk')e.preventDefault();});
document.addEventListener('keydown',e=>{if(APP.screen==='tk'&&(e.ctrlKey||e.metaKey)&&['c','v','u','s'].includes(e.key.toLowerCase()))e.preventDefault();});

// ── INIT ──
loadSaved();
if(APP.profile){goTo('overview');}else{renderNav();document.getElementById('app').innerHTML=renderSetup();}
</script>
