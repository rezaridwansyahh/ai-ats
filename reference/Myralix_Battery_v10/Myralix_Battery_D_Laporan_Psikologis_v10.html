<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myralix — Laporan Psikologis Battery D v10</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --teal:#0A6E5C;--teal-dk:#064E3B;--teal-md:#0D9488;--teal-lt:#C7E8E3;--teal-xlt:#EDF7F5;
  --amber:#D97706;--amber-lt:#FFFBEB;--amber-bd:#FDE68A;
  --red:#DC2626;--red-lt:#FEF2F2;--red-bd:#FECACA;
  --green:#059669;--green-lt:#ECFDF5;--green-bd:#A7F3D0;
  --indigo:#4F46E5;--indigo-lt:#EEF2FF;--indigo-bd:#C7D2FE;
  --navy:#0F172A;--slate:#334155;--slate-md:#64748B;--slate-lt:#94A3B8;
  --border:#E2E8F0;--border-dk:#CBD5E1;--white:#fff;--cream:#FAFAF8;
  --c1:#0A6E5C;--c1-lt:#EDF7F5;--c2:#6366F1;--c2-lt:#EEF2FF;
  --c3:#7C3AED;--c3-lt:#F5F3FF;--c4:#DB2777;--c4-lt:#FDF2F8;
  --c5:#0891B2;--c5-lt:#ECFEFF;--c6:#DC2626;--c6-lt:#FEF2F2;
  --r:14px;--rs:9px;
  --sh:0 1px 4px rgba(15,23,42,.07),0 4px 16px rgba(15,23,42,.05);
  --sh-lg:0 8px 32px rgba(15,23,42,.12),0 2px 8px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--navy);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
.navbar{background:linear-gradient(135deg,var(--teal-dk) 0%,var(--teal) 100%);padding:0 20px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(6,78,59,.25)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
.nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-txt{font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:.04em}
.nav-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.nav-badge{background:rgba(255,255,255,.15);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.2)}
.nav-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:5px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.22)}
.nav-btn.print-btn{background:rgba(255,255,255,.9);color:var(--teal-dk)}
.section-nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:200;transition:.3s;transform:translateY(-100%);opacity:0;pointer-events:none}
.section-nav.visible{transform:translateY(0);opacity:1;pointer-events:all}
.snav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:4px;padding:8px 20px;overflow-x:auto;scrollbar-width:none}
.snav-inner::-webkit-scrollbar{display:none}
.sn-link{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;color:var(--slate-md);white-space:nowrap;transition:.15s;border:1px solid transparent;cursor:pointer}
.sn-link:hover{background:var(--teal-xlt);color:var(--teal-dk);border-color:var(--teal-lt)}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 80px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .35s ease}
.flabel{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--slate-md);margin-bottom:5px}
.finput,.fsel{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 13px;color:var(--navy);font-size:13.5px;font-family:inherit;outline:none;transition:.2s}
.finput:focus,.fsel:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,110,92,.08)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg1{margin-bottom:12px}
@media(max-width:600px){.fg2,.fg3{grid-template-columns:1fr}}
.btn-primary{background:linear-gradient(135deg,var(--teal-dk),var(--teal));color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;width:100%;transition:.2s}
.btn-primary:hover{opacity:.9}
.btn-sec{background:#fff;border:1.5px solid var(--border);color:var(--slate);padding:8px 16px;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn-sec:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xlt)}
.setup-hero{background:linear-gradient(135deg,var(--teal-dk) 0%,var(--teal) 55%,var(--teal-md) 100%);border-radius:var(--r);padding:32px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.setup-hero::before{content:'D';position:absolute;right:-10px;bottom:-20px;font-family:'Playfair Display',serif;font-size:120px;font-weight:700;opacity:.06;line-height:1;pointer-events:none}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--sh);margin-bottom:16px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-lt);margin-bottom:14px}
.report-hero{background:linear-gradient(135deg,#0A2A22 0%,var(--teal-dk) 45%,var(--teal) 100%);border-radius:var(--r);color:#fff;margin-bottom:16px;overflow:hidden;box-shadow:var(--sh-lg)}
.rh-top{display:flex;align-items:center;justify-content:space-between;padding:18px 26px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.rh-logo-row{display:flex;align-items:center;gap:10px}
.rh-brand{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.08em}
.rh-body{padding:20px 26px 22px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
@media(max-width:680px){.rh-body{grid-template-columns:1fr}}
.rh-name{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,30px);font-weight:700;margin-bottom:4px;line-height:1.2}
.rh-meta-table{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;max-width:420px;margin-top:10px}
.rh-meta-item{background:rgba(255,255,255,.1);border-radius:var(--rs);padding:7px 12px}
.rh-meta-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:2px}
.rh-meta-val{font-size:12.5px;font-weight:600}
.rh-scorecard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r);padding:16px 20px;min-width:130px;text-align:center;flex-shrink:0}
.rh-sc-ring{width:72px;height:72px;border-radius:50%;border:4px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;flex-direction:column}
.rh-sc-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1}
.rh-sc-sub{font-size:9px;font-weight:700;opacity:.7;margin-top:1px}
.scorecard-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:700px){.scorecard-row{grid-template-columns:1fr 1fr}}
.sc-chip{border-radius:var(--r);padding:14px 16px;border:1.5px solid;position:relative;overflow:hidden}
.sc-chip-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.sc-chip-value{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1}
.sc-chip-sub{font-size:10.5px;margin-top:3px;opacity:.75}
.sc-chip-verdict{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-top:5px}
.section-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.section-header{display:flex;align-items:center;gap:14px;padding:16px 22px}
.sec-num{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;flex-shrink:0;border:2px solid}
.sec-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;line-height:1.2}
.sec-instrument{font-size:11px;font-weight:500;margin-top:2px;opacity:.7}
.sec-tags{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.sec-tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.sec-body{padding:0 22px 20px}
.score-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.score-table th{background:#F8FAFC;padding:9px 12px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-md);border-bottom:2px solid var(--border)}
.score-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.total-row{background:linear-gradient(90deg,var(--teal-xlt),transparent)}
.total-row td{font-weight:700}
.score-ring-sm{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:2.5px solid;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1}
.verdict-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid}
.bar-wrap{background:#F1F5F9;border-radius:99px;height:7px;overflow:hidden;margin-bottom:4px}
.bar-fill{height:7px;border-radius:99px;transition:width 1.2s ease}
.narrative-box{background:linear-gradient(135deg,#FAFFFE,#F0F8F6);border:1px solid var(--teal-lt);border-radius:var(--rs);padding:16px 18px;font-size:13px;line-height:1.82;color:var(--slate);min-height:90px;cursor:text;outline:none;white-space:pre-wrap;transition:.2s}
.narrative-box:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,110,92,.07);background:#fff}
.narrative-box.loading{color:var(--slate-lt);font-style:italic;background:#F8FAFC;border-left:3px solid var(--amber);animation:pload 1.5s infinite}
@keyframes pload{0%,100%{opacity:.7}50%{opacity:1}}
.narr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.narr-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-dk)}
.regen-btn{background:none;border:1px solid var(--border);color:var(--slate-md);padding:4px 10px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.regen-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xlt)}
.ai-progress{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--teal-xlt),#fff);border:1px solid var(--teal-lt);border-radius:var(--rs);padding:10px 16px;margin-bottom:14px;transition:opacity .6s}
.ai-prog-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.ai-prog-bar{height:6px;background:linear-gradient(90deg,var(--teal),var(--teal-md));border-radius:99px;transition:width .5s ease;width:0%}
.ai-prog-count{font-size:12px;font-weight:700;color:var(--teal-dk);white-space:nowrap}
.disclaimer{background:var(--amber-lt);border:1px solid var(--amber-bd);border-radius:var(--rs);padding:11px 16px;font-size:12px;color:#78350F;margin-bottom:16px;line-height:1.6}
.rcr-section{background:#F8FAFC;border-radius:var(--rs);padding:12px 16px;margin-top:12px;border:1px solid var(--border)}
.rcr-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--slate-md);margin-bottom:8px}
.rcr-buttons{display:flex;gap:8px;flex-wrap:wrap}
.rcr-btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;font-family:inherit;transition:.15s}
.rcr-btn.sesuai:hover,.rcr-btn.sesuai.active{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.rcr-btn.pertimbangkan:hover,.rcr-btn.pertimbangkan.active{background:var(--amber-lt);border-color:var(--amber);color:var(--amber)}
.rcr-btn.tidak:hover,.rcr-btn.tidak.active{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.assessor-notes{margin-top:10px}
.an-label{font-size:11px;font-weight:700;color:var(--slate-md);margin-bottom:5px}
.an-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:12.5px;font-family:inherit;color:var(--slate);background:#FAFAFA;outline:none;resize:vertical;min-height:70px;transition:.15s}
.an-textarea:focus{border-color:var(--teal);background:#fff}
.sec-divider{height:1px;background:var(--border);margin:16px 0}
.qcr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--border);background:#FAFAFA;margin-bottom:8px;gap:12px}
.qcr-instrument{font-size:13px;font-weight:600;color:var(--slate);margin-bottom:2px}
.qcr-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.final-rec-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:600px){.final-rec-wrap{grid-template-columns:1fr}}
.final-rec-btn{border-radius:var(--r);padding:16px 12px;text-align:center;cursor:pointer;font-family:inherit;border:2px solid var(--border);background:#FAFAFA;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:5px}
.final-rec-btn.pass{border-color:var(--green);background:var(--green-lt)}
.final-rec-btn.warn{border-color:var(--amber);background:var(--amber-lt)}
.final-rec-btn.fail{border-color:var(--red);background:var(--red-lt)}
.final-rec-btn.active{box-shadow:0 0 0 3px currentColor}
.rec-emoji{font-size:24px}
.rec-title{font-size:12px;font-weight:800;letter-spacing:.04em}
.rec-crit{font-size:10px;color:var(--slate-md);line-height:1.5}
.papi-cell{border-radius:var(--rs);padding:9px 12px;border:1.5px solid var(--border);background:#FAFAFA;margin-bottom:5px}
.papi-range-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pf16-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:12px}
.pf16-cell{border-radius:var(--rs);padding:8px 10px;border:1px solid var(--border);background:#FAFAFA}
.msdt-chip{border-radius:var(--r);padding:16px 18px;margin-bottom:12px;border:2px solid}

.score-pill{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.signature-block{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:20px;padding:20px;border:1px solid var(--border);border-radius:var(--r);background:#FAFAFA}
.sig-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--slate-md);margin-bottom:6px}
.sig-line{height:1px;background:var(--border-dk)}
.sig-detail{font-size:12px;color:var(--slate-md);margin-top:4px}
.print-footer{font-size:11px;color:var(--slate-lt);text-align:center;padding:16px 0 0;border-top:1px solid var(--border);margin-top:16px}
.sum-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}
.sum-table th{background:#F8FAFC;padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-md);border-bottom:2px solid var(--border)}
.sum-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.sum-total{background:linear-gradient(90deg,var(--teal-xlt),transparent)}
.sum-total td{font-weight:700}
@media print{.navbar,.section-nav,.no-print,.regen-btn,.rcr-section,.assessor-notes,.final-rec-wrap>*:not(.active){display:none!important}.wrap{padding:0}body{background:#fff}.section-card{box-shadow:none;border:1px solid #ddd}}


/* ═══ v10: Manager View + 3-Pillar Bridge ═══ */
.mgr-view{display:flex;flex-direction:column;gap:14px;margin:20px 0 18px}

/* 3-pillar bar — matches Myralix platform's assessment results columns */
.pillar-bar{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pillar-bar-label{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate-md);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.pillar-bar-label::after{content:'';flex:1;height:1px;background:var(--border)}
.pillar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden}
.pillar-cell{padding:16px 14px;text-align:center;border-right:1px solid var(--border);background:#fff;position:relative}
.pillar-cell:last-child{border-right:none;background:linear-gradient(180deg,var(--teal-xlt),#fff)}
.pillar-icon{font-size:18px;margin-bottom:4px;opacity:.8}
.pillar-name{font-size:11px;font-weight:600;color:var(--slate-md);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pillar-score{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1;margin-bottom:4px}
.pillar-overall .pillar-score{font-size:42px;color:var(--teal-dk)}
.pillar-max{font-size:13px;color:var(--slate-lt);font-weight:500}
.pillar-badge{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid}
.pill-pass{background:var(--pass-bg);color:var(--pass);border-color:var(--pass-br)}
.pill-warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-br)}
.pill-fail{background:var(--fail-bg);color:var(--fail);border-color:var(--fail-br)}
.pillar-threshold{font-size:9.5px;color:var(--slate-lt);margin-top:4px;font-weight:500}

/* Hero verdict banner */
.hero-verdict{border-radius:var(--r);padding:26px 30px;position:relative;overflow:hidden;border:2px solid;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.hero-verdict.pass{background:linear-gradient(135deg,#F0FDF4 0%,#DCFCE7 100%);border-color:var(--pass-br);color:var(--pass)}
.hero-verdict.warn{background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 100%);border-color:var(--warn-br);color:var(--warn)}
.hero-verdict.fail{background:linear-gradient(135deg,#FFF1F2 0%,#FEE2E2 100%);border-color:var(--fail-br);color:var(--fail)}
.hero-verdict.empty{background:#F8FAFC;border-color:var(--border);color:var(--slate-md)}
.hv-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.85}
.hv-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-top:6px;line-height:1.15}
.hv-sub{font-size:14px;margin-top:10px;color:var(--slate);font-weight:500;max-width:780px}

/* Manager summary card */
.mgr-summary{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:22px 26px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mgr-summary h3{font-family:'Playfair Display',Georgia,serif;margin:0 0 14px;font-size:18px;color:var(--teal-dk);display:flex;align-items:center;gap:10px;font-weight:700}
.mgr-summary h3::before{content:'';width:4px;height:18px;background:var(--teal);border-radius:2px}
.mgr-score-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-lt)}
.mgr-score-row:last-child{border-bottom:none}
.msr-icon{font-size:22px;width:38px;text-align:center;opacity:.85}
.msr-info{flex:1;min-width:0}
.msr-title{font-size:14px;font-weight:600;color:var(--navy)}
.msr-desc{font-size:12px;color:var(--slate-md);margin-top:2px}
.msr-score{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--teal-dk);text-align:right;min-width:56px}
.msr-chip{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap;min-width:110px;text-align:center}
.msr-chip.pass{background:var(--pass-bg);color:var(--pass);border-color:var(--pass-br)}
.msr-chip.warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-br)}

function getVerdict(s){if(s>=7)return{v:'pass',label:'LOLOS',short:'Lolos',emoji:'✅',color:'#15803D',bg:'#F0FDF4',br:'#16A34A'};if(s>=5)return{v:'warn',label:'PERTIMBANGKAN',short:'Pertimbangkan',emoji:'⚠️',color:'#92400E',bg:'#FFFBEB',br:'#D97706'};return{v:'fail',label:'TIDAK LOLOS',short:'Tidak Lolos',emoji:'❌',color:'#991B1B',bg:'#FFF1F2',br:'#DC2626'};}

function loadState(){try{STATE=JSON.parse(localStorage.getItem(STATE_KEY)||'{}');}catch{STATE={};}}

function buildReport(){
  const name=document.getElementById('r-name')?.value?.trim(),jabatan=document.getElementById('r-jabatan')?.value?.trim();
  if(!name||!jabatan){alert('Nama dan posisi wajib diisi.');return;}
  STATE.nomerKandidat=document.getElementById('r-nomer')?.value?.trim()||'';
  STATE.departemen=document.getElementById('r-dept')?.value?.trim()||'';
  STATE.asesor=document.getElementById('r-asesor')?.value?.trim()||'';
  STATE.mengetahui=document.getElementById('r-mengetahui')?.value?.trim()||'';
  saveState();
  const fmtTgl=v=>v?new Date(v).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}):'';
  let d;try{d=JSON.parse(localStorage.getItem(SKEY)||'null');}catch{}
  REPORT.profile={name,jabatan,gender:document.getElementById('r-gender')?.value||'',education:document.getElementById('r-edu')?.value||'',date:fmtTgl(document.getElementById('r-date-tes')?.value)||fmtDate(),tglLahir:fmtTgl(document.getElementById('r-tgl-lahir')?.value)||d?.profile?.tglLahir||'',tglLahirRaw:document.getElementById('r-tgl-lahir')?.value||d?.profile?.tglLahirRaw||''};
  goTo('report');
}

async function renderReport(){
  const app=document.getElementById('app');const p=REPORT.profile;const r=REPORT.results;
  if(!p){goTo('setup');return;}
  const tk=r.tk,sjt=r.sjt,pf=r.pf,msdt=r.msdt,papil=r.papil;
  const tkComp=tk?.composite||null,tkVd=tkComp?getVerdict(Math.round(tkComp)):null;
  const sjtVd=sjt?getVerdict(sjt.score10):null;
  app.innerHTML=buildStaticReport(p,r,tk,sjt,pf,msdt,papil,tkComp,tkVd,sjtVd);
  setTimeout(()=>{document.querySelectorAll('[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%';});},200);
  restoreState();
  const hasEdits=NARR_IDS.some(id=>STATE['edit_'+id]);
  if(!hasEdits){aiDone=0;updateAIProgress();await generateAllNarratives(p,r,tk,sjt,pf,msdt,papil,tkComp,tkVd,sjtVd);}
  else document.getElementById('ai-progress')?.remove();
}

function updateAIProgress(){
  const bar=document.getElementById('ai-prog-bar'),count=document.getElementById('ai-prog-count'),label=document.getElementById('ai-prog-label');
  if(bar)bar.style.width=(aiDone/AI_TOTAL*100)+'%';
  if(count)count.textContent=`${aiDone}/${AI_TOTAL}`;
  if(label)label.textContent=aiDone>=AI_TOTAL?'✅ Semua narasi siap — klik teks untuk mengedit':'Menghasilkan narasi psikologis...';
  if(aiDone>=AI_TOTAL){setTimeout(()=>{const el=document.getElementById('ai-progress');if(el){el.style.opacity='0';setTimeout(()=>el?.remove(),600);}},2000);}
}
async function callClaude(prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:`Anda adalah psikolog industri dan organisasi senior berpengalaman dalam asesmen psikologis untuk rekrutmen eksekutif di Indonesia. Tulis interpretasi psikologis yang profesional, akurat, dan berbasis bukti dalam Bahasa Indonesia formal. Gunakan terminologi psikologi yang tepat. Tulis dalam paragraf mengalir dan padat. Maksimal 220 kata per bagian.`,
      messages:[{role:'user',content:prompt}]})});
  const data=await resp.json();
  return(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
}
async function generateAllNarratives(p,r,tk,sjt,pf,msdt,papil,tkComp,tkVd,sjtVd){
  const name=p.name,jabatan=p.jabatan;
  const tkD=tk?`TK:${tkComp||'—'}/10 GI:${tk.sub?.GI?.score10||'—'}/10 IQ≈${tk.sub?.GI?.iq||'—'}, PV:${tk.sub?.PV?.score10||'—'}, KN:${tk.sub?.KN?.score10||'—'}, PA:${tk.sub?.PA?.score10||'—'}`:'TK:tidak tersedia';
  const sjtD=sjt?`SJT:${sjt.score10}/10 (${sjt.overallPct}% ${sjt.profile||''} ${SJT_PROFILES_D[sjt.profile]?.name||''}) top:${(sjt.sortedComps||[]).slice(0,2).map(([k,v])=>`${k}${v}%`).join(',')}`:'SJT:tidak tersedia';
  const pfD=pf?`16PF:${Object.entries(pf.std||{}).map(([k,v])=>`${k}:${v}`).join(',')}`:'16PF:tidak tersedia';
  const msdtD=msdt?`MSDT:gaya=${msdt.dominant}(${MSDT_STYLES_D[msdt.dominant]?.name||''}),TO=${msdt.TO}%,RO=${msdt.RO}%,efektivitas=${msdt.effectPct}%`:'MSDT:tidak tersedia';
  const papilD=papil?`PAPI-L:Role(${PAPI_L_ROLE.map(d=>`${d}:${papil.scores[d]||0}`).join(',')})Need(${PAPI_L_NEED.map(d=>`${d}:${papil.scores[d]||0}`).join(',')})`:'PAPI-L:tidak tersedia';
  const ctx=`Kandidat: ${name}, posisi: ${jabatan} (Battery D — Senior Leadership & Eksekutif).\n`;
  const tasks=[
    {id:'narr-tk',prompt:`${ctx}${tkD}\nTulis interpretasi psikologis kemampuan kognitif untuk posisi senior leadership/eksekutif. Jelaskan makna komposit TK, setiap subtes (GI=berpikir umum, PV=verbal, KN=numerik, PA=abstrak), IQ estimasi, dan implikasinya untuk pemikiran strategis, kompleksitas analitis, dan kecepatan pengambilan keputusan pada tingkat eksekutif.`},

    {id:'narr-konsol',prompt:`${ctx}${tkD}\n${sjtD}\n${pfD}\n${msdtD}\n${papilD}\nTulis ringkasan profil psikologis terintegrasi senior leadership dalam 3 paragraf: (1) Kapasitas kognitif dan kematangan penilaian situasional, (2) Profil kepribadian, gaya kepemimpinan, dan preferensi kepemimpinan, (3) Sintesis kesiapan untuk peran senior leadership/eksekutif. Maks 300 kata.`},
    {id:'narr-strength',prompt:`${ctx}${tkD}\n${sjtD}\n${pfD}\n${msdtD}\n${papilD}\nIdentifikasi 4 kekuatan kepemimpinan eksekutif utama kandidat yang didukung data spesifik dari hasil tes. Format: deskripsi per kekuatan 2-3 kalimat, berbasis bukti.`},
    {id:'narr-rec',prompt:`${ctx}${tkD}\n${sjtD}\n${pfD}\n${msdtD}\n${papilD}\nBerikan rekomendasi rekruter senior yang komprehensif: direkomendasikan, perlu evaluasi, atau tidak direkomendasikan. Sertakan alasan berbasis data, area konfirmasi wawancara kritis, dan saran onboarding/program pengembangan eksekutif jika direkomendasikan. Maks 220 kata.`},
  ];
  await Promise.all(tasks.map(async({id,prompt})=>{const el=document.getElementById(id);if(!el)return;if(STATE['edit_'+id]){el.textContent=STATE['edit_'+id];el.classList.remove('loading');aiDone++;updateAIProgress();return;}try{const text=await callClaude(prompt);el.textContent=text;el.classList.remove('loading');}catch(e){el.textContent=`[Gagal: ${e.message}. Klik Regenerasi.]`;el.classList.remove('loading');el.style.borderLeftColor='#DC2626';}aiDone++;updateAIProgress();saveState();}));
}

<script>

// ═══ v10: Manager View + 3-Pillar Bridge (Battery D) ═══
const BATTERY_CODE = 'D';
const BATTERY_ROLE = 'Senior Leadership / Executive';

// 3-pillar bridge: map battery-specific scores → Cognitive/Personality/WorkAttitude/Overall (0-100)
// Matches Myralix platform's Assessment Results Table columns
function calc3Pillar(r) {
  const pillar = {cognitive: null, personality: null, workAttitude: null, overall: null};
  if (!r) return pillar;

  // Cognitive: TK composite scaled to 0-100 (same for all batteries)
  if (r.tk?.composite != null) pillar.cognitive = Math.round(r.tk.composite * 10);

  // Personality & Work Attitude — per-battery mapping
  if (BATTERY_CODE === 'A') {
    // Personality: Big Five weighted — high C, low N, high A = good for operational
    if (r.bigfive?.pct) {
      const C = r.bigfive.pct.C || 50;
      const N = r.bigfive.pct.N || 50;
      const A = r.bigfive.pct.A || 50;
      pillar.personality = Math.round(C * 0.4 + (100 - N) * 0.3 + A * 0.3);
    }
    // Work Attitude: DISC-appropriateness × 0.5 + Holland-congruence × 0.5
    if (r.disc || r.holland) {
      let discFit = 60, holFit = 60;
      if (r.disc?.dominant === 'S') discFit = 100;
      else if (r.disc?.dominant === 'C') discFit = 85;
      else if (r.disc?.dominant === 'D' || r.disc?.dominant === 'I') discFit = 55;
      if (r.holland?.code3) {
        const code = r.holland.code3;
        if (code.includes('C') || code.includes('S')) holFit = 95;
        else if (code.includes('R')) holFit = 80;
        else holFit = 55;
      }
      pillar.workAttitude = Math.round(discFit * 0.5 + holFit * 0.5);
    }
  } else if (BATTERY_CODE === 'B') {
    // Personality: EPPS coherence + consistency
    if (r.epps) {
      const conS = (r.epps.conScore || 7) / 15 * 100;  // 0-100 based on consistency
      const base = 70;  // baseline for completed EPPS
      pillar.personality = Math.round(Math.min(100, base + (conS - 50) * 0.4));
    }
    // Work Attitude: PAPI preference fit × 0.5 + Holland I-congruence × 0.5
    if (r.papi || r.holland) {
      let papiFit = 60, holFit = 60;
      if (r.papi?.scores) {
        const s = r.papi.scores;
        if ((s.C || 0) >= 6 && (s.T || 0) >= 6) papiFit = 90;
        else if ((s.W || 0) >= 8) papiFit = 55;
        else papiFit = 70;
      }
      if (r.holland?.code3) {
        const code = r.holland.code3;
        if (code.includes('I')) holFit = 95;
        else if (code.includes('C')) holFit = 80;
        else holFit = 55;
      }
      pillar.workAttitude = Math.round(papiFit * 0.5 + holFit * 0.5);
    }
  } else if (BATTERY_CODE === 'C') {
    // Personality: EPPS + SJT blend (SJT has leadership insights)
    const eppsP = r.epps ? 70 + ((r.epps.conScore || 7) / 15 - 0.5) * 40 : null;
    const sjtP = r.sjt?.overallPct != null ? r.sjt.overallPct : null;
    if (eppsP != null && sjtP != null) pillar.personality = Math.round((eppsP + sjtP) / 2);
    else if (eppsP != null) pillar.personality = Math.round(eppsP);
    else if (sjtP != null) pillar.personality = Math.round(sjtP);
    // Work Attitude: PAPI leadership fit
    if (r.papi?.scores) {
      const s = r.papi.scores;
      const L = s.L || 0, I = s.I || 0, K = s.K || 0, F = s.F || 0;
      if (L >= 5 && I >= 5) pillar.workAttitude = 90;
      else if (K >= 7 && F >= 7) pillar.workAttitude = 50;
      else pillar.workAttitude = 70;
    }
  } else if (BATTERY_CODE === 'D') {
    // Personality: 16PF executive factors
    if (r.pf?.std) {
      const std = r.pf.std;
      const execScore = (
        (std.C || 5) * 10 +          // emotional stability
        (std.Q3 || 5) * 10 +         // self-discipline
        ((11 - (std.Q4 || 5))) * 10 +  // low tension (inverted)
        (std.E || 5) * 6 +            // dominance
        (std.H || 5) * 6 +            // social boldness
        ((11 - (std.O || 5))) * 6     // low apprehension (inverted)
      ) / 4.8;
      pillar.personality = Math.round(Math.min(100, Math.max(0, execScore)));
    }
    // Work Attitude: MSDT effectiveness × 0.5 + PAPI-L leadership × 0.5
    if (r.msdt || r.papil) {
      let msdtFit = 60, papilFit = 60;
      if (r.msdt?.effectPct != null) msdtFit = Math.min(100, r.msdt.effectPct);
      if (r.papil?.scores) {
        const s = r.papil.scores;
        const L = s.L || 0, I = s.I || 0, K = s.K || 0, F = s.F || 0;
        if (L >= 5 && I >= 5) papilFit = 90;
        else if (K >= 6 && F >= 6) papilFit = 50;
        else papilFit = 70;
      }
      pillar.workAttitude = Math.round(msdtFit * 0.5 + papilFit * 0.5);
    }
  }

  // Overall: weighted mean with cognitive as anchor (mandatory gate)
  const vals = [pillar.cognitive, pillar.personality, pillar.workAttitude].filter(v => v != null);
  if (vals.length > 0) pillar.overall = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);

  return pillar;
}

// Thresholds (aligned with Myralix mockup defaults)
const PILLAR_THRESHOLDS = {cognitive: 70, personality: 65, workAttitude: 70, overall: 70};

function pillarVerdict(score, threshold) {
  if (score == null) return 'empty';
  if (score >= threshold) return 'pass';
  if (score >= threshold - 15) return 'warn';
  return 'fail';
}

// Overall candidate verdict
function deriveOverallVerdict(r, rpt) {
  const pillar = calc3Pillar(r);
  if (pillar.overall == null) return {kind: 'empty', label: 'Belum Tersedia', sub: 'Kandidat belum menyelesaikan asesmen'};

  // Priority: recruiter's explicit final rec
  const finalRec = rpt?.finalRec;
  if (finalRec === 'direkomendasikan' || finalRec === 'kuat') return {kind:'pass', label:'Direkomendasikan Kuat', sub:'Rekruter menilai kandidat sesuai untuk peran ' + BATTERY_ROLE};
  if (finalRec === 'evaluasi' || finalRec === 'pertimbangkan') return {kind:'warn', label:'Perlu Pertimbangan', sub:'Rekruter menilai kandidat perlu evaluasi lebih lanjut'};
  if (finalRec === 'tidak') return {kind:'fail', label:'Tidak Direkomendasikan', sub:'Rekruter menilai kandidat belum sesuai untuk peran ini'};

  // Auto-derive from pillars
  const cogV = pillarVerdict(pillar.cognitive, PILLAR_THRESHOLDS.cognitive);
  const perV = pillarVerdict(pillar.personality, PILLAR_THRESHOLDS.personality);
  const waV = pillarVerdict(pillar.workAttitude, PILLAR_THRESHOLDS.workAttitude);
  const overV = pillarVerdict(pillar.overall, PILLAR_THRESHOLDS.overall);

  if (cogV === 'fail') return {kind:'fail', label:'Tidak Direkomendasikan', sub:'Kapasitas kognitif belum mencukupi persyaratan minimum peran'};
  const fails = [cogV, perV, waV].filter(v => v === 'fail').length;
  const warns = [cogV, perV, waV].filter(v => v === 'warn').length;
  if (fails >= 2) return {kind:'fail', label:'Tidak Direkomendasikan', sub:'Beberapa dimensi inti tidak memenuhi tuntutan peran'};
  if (fails >= 1) return {kind:'warn', label:'Perlu Pertimbangan', sub:'Ada dimensi penting yang belum memadai — perlu evaluasi lanjutan'};
  if (warns >= 2) return {kind:'warn', label:'Perlu Pertimbangan', sub:'Skor berada di zona menengah pada beberapa dimensi'};
  if (overV === 'pass' && cogV === 'pass') return {kind:'pass', label:'Direkomendasikan Kuat', sub:'Kapasitas kognitif dan profil kandidat mendukung peran ' + BATTERY_ROLE};
  return {kind:'warn', label:'Perlu Pertimbangan', sub:'Evaluasi lanjutan disarankan sebelum keputusan final'};
}

// Plain-language narrative for manager (no jargon)
function genManagerSummary(r, verdict, profile) {
  if (!r?.tk) return 'Data asesmen belum tersedia atau belum lengkap.';
  const name = profile?.name || 'Kandidat';
  const pillar = calc3Pillar(r);
  const parts = [];

  // Cognitive sentence
  if (pillar.cognitive != null) {
    if (pillar.cognitive >= 80) parts.push(`<strong>${name}</strong> menunjukkan kemampuan kognitif yang kuat (skor ${pillar.cognitive}/100) — siap menguasai materi peran dengan cepat.`);
    else if (pillar.cognitive >= 70) parts.push(`<strong>${name}</strong> memiliki kemampuan kognitif yang memadai (skor ${pillar.cognitive}/100) untuk tuntutan peran.`);
    else if (pillar.cognitive >= 55) parts.push(`<strong>${name}</strong> memiliki kemampuan kognitif di zona menengah (skor ${pillar.cognitive}/100) — perlu pendampingan ekstra saat onboarding.`);
    else parts.push(`<strong>${name}</strong> menunjukkan kemampuan kognitif yang belum memadai (skor ${pillar.cognitive}/100) untuk tuntutan peran.`);
  }

  // Personality sentence
  if (pillar.personality != null) {
    if (pillar.personality >= 75) parts.push(`Profil kepribadiannya <strong>mendukung kuat</strong> karakter peran yang diharapkan.`);
    else if (pillar.personality >= 65) parts.push(`Profil kepribadiannya <strong>cukup sesuai</strong> dengan karakter peran.`);
    else if (pillar.personality >= 50) parts.push(`Profil kepribadiannya menunjukkan <strong>kombinasi campuran</strong> — ada area yang sesuai dan ada yang perlu dievaluasi.`);
    else parts.push(`Profil kepribadiannya menunjukkan <strong>risiko ketidakcocokan</strong> dengan karakter peran.`);
  }

  // Work attitude sentence
  if (pillar.workAttitude != null) {
    if (pillar.workAttitude >= 75) parts.push(`Sikap kerjanya <strong>selaras</strong> dengan budaya dan tuntutan posisi.`);
    else if (pillar.workAttitude < 55) parts.push(`Sikap kerjanya menunjukkan <strong>orientasi yang kurang selaras</strong> dengan tuntutan posisi.`);
  }

  // Closing
  if (verdict.kind === 'pass') parts.push(`Berdasarkan data ini, kandidat <strong>layak dilanjutkan</strong> ke tahap berikutnya.`);
  else if (verdict.kind === 'warn') parts.push(`Berdasarkan data ini, kandidat dapat dipertimbangkan dengan <strong>evaluasi tambahan</strong>.`);
  else if (verdict.kind === 'fail') parts.push(`Berdasarkan data ini, kandidat <strong>kurang sesuai</strong> untuk peran ini.`);

  return parts.join(' ');
}

  // Hero verdict

        </div>
        <div class="msr-score">${pillar.workAttitude ?? '—'}<span style="font-size:12px;color:var(--slate-lt);font-weight:400">/100</span></div>
        ${mgrChip(pv.workAttitude, pv.workAttitude==='pass'?'✅ Selaras':pv.workAttitude==='warn'?'⚠️ Pertimbangkan':pv.workAttitude==='fail'?'❌ Tidak Selaras':'— Pending')}
      </div>
      <div class="mgr-narrative">${summary}</div>
      <div class="mgr-actions no-print">
        <div class="mgr-actions-label">Tindak Lanjut Manajer</div>
        <div class="mgr-actions-grid">
          <button class="mgr-act-btn primary ${activeRec==='direkomendasikan'?'active':''}" onclick="setMgrAction('direkomendasikan')">
            <span class="mgr-act-icon">✅</span>Lanjutkan ke Wawancara
          </button>
          <button class="mgr-act-btn warn ${activeRec==='evaluasi'?'active':''}" onclick="setMgrAction('evaluasi')">
            <span class="mgr-act-icon">⚠️</span>Butuh Evaluasi Lanjutan
          </button>
          <button class="mgr-act-btn fail ${activeRec==='tidak'?'active':''}" onclick="setMgrAction('tidak')">
            <span class="mgr-act-icon">❌</span>Tidak Dilanjutkan
          </button>
        </div>
      </div>
    </div>
  `;

  return `<section class="mgr-view">${pillarBar}${heroVerdict}${mgrSum}</section>`;
}

function setMgrAction(val) {
  STATE.finalRec = val;
  setFinalRec(val);
  saveState();
  // Re-render manager view
  injectManagerView();
}

function injectManagerView() {
  // Remove existing if present
  document.querySelectorAll('.mgr-view').forEach(el => el.remove());
  document.querySelectorAll('.detail-wrapper').forEach(el => {
    // Unwrap detail-wrapper contents back to top-level
    const parent = el.parentNode;
    while (el.firstChild && el.firstChild !== el.querySelector('.detail-summary')) {
      parent.insertBefore(el.firstChild, el);
    }
    // Then move children out in correct order
  });

  const app = document.getElementById('app');
  if (!app || !REPORT.profile) return;

  // Find injection point: after .disclaimer or .scorecard-row
  const anchor = app.querySelector('.scorecard-row') || app.querySelector('.disclaimer');
  if (!anchor) return;

  // Insert manager view
  anchor.insertAdjacentHTML('afterend', buildManagerView());

  // Wrap existing detail sections in a <details>
  const mgrView = app.querySelector('.mgr-view');
  if (!mgrView) return;
  const wrapper = document.createElement('details');
  wrapper.className = 'detail-wrapper';
  wrapper.id = 'detail-wrapper';
  wrapper.open = false;
  wrapper.innerHTML = `
    <summary class="detail-summary">
      <span class="ds-icon">📋</span>
      <span class="ds-title">Detail Psikologis untuk HR / Psikolog</span>
      <span class="ds-hint">— Klik untuk membuka / menutup</span>
    </summary>
    <div class="detail-content"></div>
  `;
  mgrView.insertAdjacentElement('afterend', wrapper);

  // Move all subsequent elements into detail-content
  const target = wrapper.querySelector('.detail-content');
  let next = wrapper.nextSibling;
  while (next) {
    const toMove = next;
    next = next.nextSibling;
    target.appendChild(toMove);
  }
}

// Auto-inject after renderReport completes
const _origRenderReport = renderReport;
renderReport = async function() {
  await _origRenderReport.apply(this, arguments);
  setTimeout(injectManagerView, 50);
};

</script>
</body>
</html>
