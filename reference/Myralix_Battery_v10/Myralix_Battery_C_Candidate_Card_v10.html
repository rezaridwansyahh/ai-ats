.q-card-single{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;box-shadow:var(--sh-sm);margin-bottom:14px}
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.q-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--teal-lt);color:var(--teal);font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;width:38px;height:38px;border-radius:50%;flex-shrink:0}
.q-meta-txt{font-size:12px;color:var(--slate-md)}

.q-opts-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}

.q-opt.sel .q-opt-let{background:var(--teal);border-color:var(--teal);color:#fff}
.q-opt-txt{font-size:13px;color:var(--slate);line-height:1.5}
.q-svg-area{margin:6px 0 14px;overflow-x:auto}
.q-input-wpt{width:100%;max-width:300px;border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-size:14px;font-family:inherit;color:var(--slate);background:#FAFAFA;outline:none;transition:.15s;display:block}

.q-stem-box{border-radius:var(--rs);padding:14px 16px;margin-bottom:14px}
.q-stem-lead{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
/* Forced-choice (EPPS/PAPI) - auto advance */
.fc-pair{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.fc-choice{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--rs);border:2px solid var(--border);background:#FAFAFA;cursor:pointer;transition:all .16s}

.intro-title{font-family:'Playfair Display',Georgia,serif;font-size:24px;margin-bottom:4px}
.intro-fn{font-size:13px;font-weight:600;color:var(--slate-md);margin-bottom:18px}
.intro-meta{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.im{padding:10px 16px;border-radius:var(--rs);border:1px solid var(--border);text-align:center}

.btn-prev{background:none;border:1.5px solid var(--border);color:var(--slate-md);padding:9px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}

/* Auto-advance flash animation */

.fc-choice.sel{animation:flash-sel .25s ease}
.q-opt.sel{animation:flash-sel .25s ease}
</style>
</head>

function normalizeAns(raw,qn){
  if(!raw&&raw!==0)return'';
  let s=String(raw).trim().toLowerCase().replace(/\s+/g,' ');
  s=s.replace(/rp\.?|rupiah|dolar|\$|kaki|cm|meter/g,'').trim();
  if(s.includes(','))return s.split(',').map(p=>p.trim()).sort().join(',');
  return s;
}
function checkAnswer(qn,userAns){
  const norm=normalizeAns(userAns,qn);
  const key=String(KEYS[qn]).trim().toLowerCase();
  if(norm===key)return true;
  const specials={4:['tidak','t','no','n'],22:['s','salah'],32:['ya','y','yes'],27:['1/30','0.03','0.033','0.0333'],31:['1/9','0.111','0.1111'],8:['0.125','1/8','⅛'],35:['0.25','1/4','¼'],37:['0.0625','1/16'],43:['0.33','.33']};
  if(specials[qn]&&specials[qn].includes(norm))return true;
  if(qn===22&&(norm==='s'||norm.startsWith('s ')||norm==='salah'))return true;
  return false;
}

function getRange(code, score) {
  // Special rules
  if(code === 'G'){return score <= 3 ? 'LOW' : score <= 7 ? 'MIDDLE' : 'HIGH';}
  if(code === 'Z' || code === 'K') {return score <= 2 ? 'LOW' : score <= 5 ? 'MIDDLE' : 'HIGH';}
  if(code === 'S'){return score < 6 ? 'LOW' : 'HIGH';}
  if(code === 'V'){return score < 5 ? 'LOW' : 'HIGH';}
  if(code === 'A'){return score <= 5 ? 'LOW' : 'HIGH';}
  if(code === 'E'){return score <= 2 ? 'LOW' : score <= 6 ? 'MIDDLE' : 'HIGH';}
  // General: 0-3 LOW, 4-6 MIDDLE, 7-9 HIGH
  return score <= 3 ? 'LOW' : score <= 6 ? 'MIDDLE' : 'HIGH';
}

function pctToScore10(pct){return Math.max(1,Math.min(10,Math.round(pct/10)));}
function getVerdict(s){if(s>=7)return{v:'pass',label:'LOLOS',emoji:'✅',color:'#15803D',bg:'#F0FDF4',br:'#16A34A'};if(s>=5)return{v:'warn',label:'PERTIMBANGKAN',emoji:'⚠️',color:'#92400E',bg:'#FFFBEB',br:'#D97706'};return{v:'fail',label:'TIDAK LOLOS',emoji:'❌',color:'#991B1B',bg:'#FFF1F2',br:'#DC2626'};}
function getGrade(pct){if(pct>=90)return{g:'A',l:'Sangat Tinggi',c:'#059669',bg:'#ECFDF5'};if(pct>=75)return{g:'B',l:'Tinggi',c:'#0369A1',bg:'#EFF6FF'};if(pct>=26)return{g:'C',l:'Rata-rata',c:'#D97706',bg:'#FFFBEB'};if(pct>=11)return{g:'D',l:'Rendah',c:'#DC2626',bg:'#FEF2F2'};return{g:'E',l:'Sangat Rendah',c:'#991B1B',bg:'#FFF1F2'};}
function getIQClass(iq){for(const c of IQ_CLASSES){if(iq>=c.min)return c;}return IQ_CLASSES[IQ_CLASSES.length-1];}
function getIQ(raw){return IQ_TABLE[Math.min(Math.max(raw,0),50)]||90;}
function fmtTime(s){const m=Math.floor(s/60),ss=s%60;return`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function s10ToLabel(s){if(s>=9)return'Sangat Tinggi';if(s>=7)return'Tinggi';if(s>=5)return'Rata-rata';if(s>=3)return'Rendah';return'Sangat Rendah';}
const ALPHA=['A','B','C','D','E','F'];

// ── NAVIGATION ──
function goTo(screen){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timer-bar').className='timer-bar';
  APP.screen=screen;
  renderNav();
  const app=document.getElementById('app');
  app.className='wrap anim';
  app.innerHTML='';
  try{
    switch(screen){
      case'setup':      app.innerHTML=renderSetup();break;
      case'overview':   app.innerHTML=renderOverview();break;
      case'tk_intro':   app.innerHTML=renderIntro('tk');break;
      case'tk':         startTK();break;
      case'epps_intro': app.innerHTML=renderIntro('epps');break;
      case'epps':       app.innerHTML=renderEPPS();break;
      case'papi_intro': app.innerHTML=renderIntro('papi');break;
      case'papi':       app.innerHTML=renderPAPI();break;
      case'sjt_intro':  app.innerHTML=renderIntro('sjt');break;
      case'sjt':        startSJT();break;
      case'complete':   app.innerHTML=renderComplete();break;
    }
  }catch(e){app.innerHTML=`<div style="padding:28px;background:#FEF2F2;border-radius:12px;color:#991B1B"><b>Error:</b> ${e.message}<br><small style="opacity:.7">${e.stack||''}</small><br><button onclick="goTo('overview')" style="margin-top:12px;padding:8px 16px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer">← Kembali</button></div>`;}
  window.scrollTo(0,0);
}
function renderNav(){
  const dots=document.getElementById('nav-dots');if(!dots)return;
  const doneSet=new Set(Object.keys(APP.results));
  const activeIdx=TESTS.indexOf(APP.screen.replace(/_intro$/,''));
  dots.innerHTML=TESTS.map((t,i)=>`<div class="${doneSet.has(t)?'nav-step done':i===activeIdx?'nav-step active':'nav-step'}" title="Tes ${i+1}"></div>`).join('');
  const allDone=TESTS.every(t=>doneSet.has(t));

}

function scoreTKSub(code){

  else{const qs=QS_MAP[code];APP.tk.answers[code].forEach((ans,idx)=>{const q=qs[idx];if(q&&ans===q.a)ok++;});}

function submitTK(){

}
function papiNext(){if(APP.papi.curQ<89){APP.papi.curQ++;document.getElementById('app').innerHTML=renderPAPI();}}
function papiPrev(){if(APP.papi.curQ>0){APP.papi.curQ--;document.getElementById('app').innerHTML=renderPAPI();}}
function papiJump(i){APP.papi.curQ=i;document.getElementById('app').innerHTML=renderPAPI();}
function submitPAPI(){
  const scores={};[...ROLE_DIMS,...NEED_DIMS].forEach(d=>{scores[d]=0;});
  APP.papi.answers.forEach((ans,i)=>{if(!ans)return;const key=SCORING_KEY[i];scores[ans==='A'?key[1]:key[2]]++;});
  const roleTotal=ROLE_DIMS.reduce((s,d)=>s+scores[d],0),needTotal=NEED_DIMS.reduce((s,d)=>s+scores[d],0);
  APP.results.papi={scores,roleTotal,needTotal,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  
  save();renderTestDone(3,'Tes 3 — Preferensi Kerja','sjt_intro');
}

// ══════════════════════════════════════════
//  SJT — AUTO-ADVANCE ON PICK + 30-MIN TIMER
// ══════════════════════════════════════════
function startSJT(){
  APP.sjt.timeLeft=1800;APP.sjt.totalTime=1800;
  const bar=document.getElementById('timer-bar');bar.className='timer-bar show';
  const badge=document.getElementById('t-badge');
  if(badge){badge.textContent='SJT';badge.style.background='#6366F130';badge.style.color='#6366F1';}
  updateSJTTimer();
  document.getElementById('app').innerHTML=renderSJT();
  timerInt=setInterval(()=>{APP.sjt.timeLeft--;updateSJTTimer();if(APP.sjt.timeLeft<=0){clearInterval(timerInt);timerInt=null;submitSJT();}},1000);
}
function updateSJTTimer(){
  const left=APP.sjt.timeLeft,total=APP.sjt.totalTime,pct=Math.max(0,left/total*100),warn=left<=120;
  const el=document.getElementById('t-disp'),fill=document.getElementById('t-fill'),info=document.getElementById('t-info');
  if(el){el.textContent=fmtTime(left);el.className='t-disp'+(warn?' warn':'');}
  if(fill){fill.style.width=pct+'%';fill.className='t-fill'+(warn?' warn':'');}
  if(info)info.textContent=`SJT · 22 skenario`;
}
function renderSJT(){
  const i=APP.sjt.curQ,q=SJT_QS[i],ans=APP.sjt.answers[i];
  const comp=COMPS[q.comp],pct=Math.round(i/22*100),answered=APP.sjt.answers.filter(a=>a!==null).length;
  const tabWarn='';
  const dots=SJT_QS.map((_,di)=>{let cls='qd';if(di===i)cls+=' cur';else if(APP.sjt.answers[di]!==null)cls+=' done';return`<div class="${cls}" onclick="sjtJump(${di})" title="${di+1}"></div>`;}).join('');
  const opts=['A','B','C','D'].map((l,oi)=>q.opts[oi]?`
    <div class="q-opt${ans===oi?' sel':''}" onclick="sjtPick(${i},${oi})">
      <div class="q-opt-let" style="${ans===oi?`background:${comp.color};border-color:${comp.color};color:#fff`:''}">${l}</div>
      <div class="q-opt-txt">${q.opts[oi].t}</div>
    </div>`:'').join('');
  return`
  <div class="q-bar with-timer"><div class="q-bar-inner">
    <span class="q-num-b" style="background:${comp.colorLt};color:${comp.color}">${i+1}/22</span>
    
    <div class="q-track"><div class="q-fill" style="width:${pct}%;background:${comp.color}"></div></div>
    <span class="q-pct">${answered}✓</span>
  </div></div>
  ${tabWarn}
  <div class="q-card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="width:30px;height:30px;border-radius:7px;background:${comp.colorLt};color:${comp.color};display:grid;place-items:center;font-family:Georgia,serif;font-size:13px;font-weight:700;flex-shrink:0">${i+1}</div>
    </div>
    <div class="sjt-situation">${esc(q.situation)}</div>
    <div class="sjt-q">${esc(q.q)}</div>
    <div class="q-opts-wrap">${opts}</div>
    <div class="qnav-wrap"><div class="qnav-dots">${dots}</div></div>
    <div style="text-align:center;font-size:11px;color:var(--slate-lt);margin-top:4px">Memilih jawaban otomatis lanjut ke skenario berikutnya</div>
    <div class="q-foot">
      <button class="btn-prev" onclick="sjtPrev()" ${i===0?'disabled':''}>← Sebelumnya</button>
      <div style="flex:1"></div>
      ${i===21?`<button class="btn-next" onclick="submitSJT()">Selesai →</button>`:
        ans!==null?`<button class="btn-next" onclick="sjtManualNext()">Selanjutnya →</button>`:
        `<button class="btn-next" disabled>Selanjutnya →</button>`}
    </div>
  </div>`;
}
// AUTO-ADVANCE on SJT (Battery A pattern)
function sjtPick(i,oi){
  APP.sjt.answers[i]=oi;
  // Brief visual flash before advancing
  setTimeout(()=>{
    if(i<21){APP.sjt.curQ++;document.getElementById('app').innerHTML=renderSJT();}
    else{clearInterval(timerInt);timerInt=null;submitSJT();}
  },180);
  // Show selected immediately
  document.querySelectorAll('.q-opt').forEach((el,idx)=>el.classList.toggle('sel',idx===oi));
}
function sjtManualNext(){if(APP.sjt.curQ<21){APP.sjt.curQ++;document.getElementById('app').innerHTML=renderSJT();}}
function sjtPrev(){if(APP.sjt.curQ>0){APP.sjt.curQ--;document.getElementById('app').innerHTML=renderSJT();}}
function sjtJump(i){APP.sjt.curQ=i;document.getElementById('app').innerHTML=renderSJT();}
function submitSJT(){
  clearInterval(timerInt);timerInt=null;document.getElementById('timer-bar').className='timer-bar';
  const compScores={KK:0,KOM:0,MK:0,OH:0,AD:0,IE:0};let totalScore=0;
  APP.sjt.answers.forEach((chosen,i)=>{
    if(chosen===null||chosen===undefined)return;
    const q=SJT_QS[i],opt=q.opts[chosen];if(!opt)return;
    compScores[q.comp]+=opt.s;totalScore+=opt.s;
  });
  const compPct={};
  for(const[k,v]of Object.entries(compScores))compPct[k]=Math.round(v/COMPS[k].maxScore*100);
  const overallPct=Math.round(totalScore/COMP_TOTAL_MAX*100);
  const sortedComps=Object.entries(compPct).sort((a,b)=>b[1]-a[1]);
  const topComp=sortedComps[0][0];
  let profile;
  if(overallPct>=78)profile='BJ';
  else if(overallPct>=58){
    if(['KK','OH'].includes(topComp))profile='EK';
    else if(['KOM','MK'].includes(topComp))profile='KL';
    else profile='AE';
  }else profile='BK';
  const score10=pctToScore10(overallPct);
  APP.results.sjt={compScores,compPct,totalScore,overallPct,score10,verdict:getVerdict(score10).v,profile,sortedComps,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),tabSwitches:APP.tabSwitches};
  save();renderTestDone(4,'Tes 4 — Penilaian Situasional','complete');
}

// ── SHARED TEST DONE ──
function renderTestDone(num,label,nextScreen){
  const isLast=num===4;
  document.getElementById('timer-bar').className='timer-bar';
  document.getElementById('app').innerHTML=`
  <div style="max-width:480px;margin:60px auto 0;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:#ECFDF5;border:3px solid #16A34A;display:inline-flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px">✅</div>
    <h2 style="font-family:Georgia,serif;font-size:22px;color:#15803D;margin-bottom:8px">${label} Selesai</h2>
    <p style="font-size:13px;color:var(--slate-md);line-height:1.7;margin-bottom:28px">
      Jawaban Anda telah direkam.<br>${isLast?'Seluruh rangkaian tes Battery C telah selesai.':'Lanjutkan ke tes berikutnya saat siap.'}
    </p>
    <button class="btn-main" style="max-width:280px;margin:0 auto" onclick="goTo('${nextScreen}')">
      ${isLast?'Lihat Ringkasan Akhir →':'Lanjut ke Tes Berikutnya →'}
    </button>
    <div style="margin-top:12px"><button onclick="goTo('overview')" class="btn-sec">← Kembali ke Daftar Tes</button></div>
  </div>`;
  renderNav();
}

// ── COMPLETE ──
function renderComplete(){
  const done=APP.results,allDone=TESTS.every(t=>done[t]),doneCount=Object.keys(done).length;
  const testLabels={tk:'Tes 1 — Kemampuan Kognitif',epps:'Tes 2 — Kepribadian',papi:'Tes 3 — Preferensi Kerja',sjt:'Tes 4 — Penilaian Situasional'};
  const checkItems=TESTS.map((t,i)=>{
    const isDone=!!done[t];
    return`<div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--rs);border:1.5px solid ${isDone?'#BBF7D0':'var(--border)'};background:${isDone?'#F0FDF4':'#FAFAFA'};margin-bottom:8px">
      <div style="width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:${isDone?'20px':'14px'};font-weight:700;flex-shrink:0;background:${isDone?'#16A34A':'var(--border)'};color:#fff">${isDone?'✓':i+1}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;color:${isDone?'#15803D':'var(--slate-lt)'}">${testLabels[t]}</div>
      <div style="font-size:11px;color:${isDone?'#4ADE80':'var(--slate-lt)'};margin-top:1px">${isDone?'Selesai':'Belum dikerjakan'}</div></div>
      <div style="font-size:20px">${isDone?'✅':'⭕'}</div>
    </div>`;
  }).join('');
  return`
  ${allDone?`
  <div class="complete-card">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">Semua Tes Selesai!</div>
    <div class="complete-sub">Selamat ${APP.profile.name}! Anda telah menyelesaikan seluruh rangkaian tes Battery C.<br>Informasikan kepada rekruter bahwa proses tes telah selesai.</div>
    <div style="background:rgba(255,255,255,.7);border-radius:var(--rs);padding:12px 16px;font-size:12px;color:var(--slate-md);border:1px solid #BBF7D0;margin-bottom:14px">
      <strong>Langkah selanjutnya:</strong> Hubungi rekruter dan informasikan bahwa semua tes telah selesai.
    </div>
    <a href="Myralix_Battery_C_Laporan_Psikologis_v10.html" target="_blank" style="display:block;background:linear-gradient(135deg,#064E3B,#0A6E5C);color:#fff;padding:13px 20px;border-radius:var(--rs);font-size:14px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:8px">📊 Buka Laporan Psikologis (Rekruter) →</a>
    <div style="font-size:11px;color:#6B7280;text-align:center">Tautan laporan hanya untuk rekruter — buka di browser yang sama</div>
  </div>`:''}
  <div class="card">
    <div class="card-title">Daftar Tes — ${doneCount} dari ${TESTS.length} Selesai</div>
    ${checkItems}
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
    <button onclick="goTo('overview')" class="btn-sec">← Kembali ke Daftar Tes</button>
    ${!allDone?`<button onclick="goTo('${TESTS.find(t=>!done[t])}_intro')" class="btn-main" style="width:auto;padding:10px 20px">Lanjutkan Tes →</button>`:''}
  </div>`;
}

// ── TAB DETECTION ──
document.addEventListener('visibilitychange',()=>{if(document.hidden&&['tk','epps','papi','sjt'].includes(APP.screen))APP.tabSwitches++;});
document.addEventListener('contextmenu',e=>{if(APP.screen==='tk'||APP.screen==='sjt')e.preventDefault();});
document.addEventListener('keydown',e=>{if((APP.screen==='tk'||APP.screen==='sjt')&&(e.ctrlKey||e.metaKey)&&['c','v','u','s'].includes(e.key.toLowerCase()))e.preventDefault();});

// ── INIT ──
loadSaved();
if(APP.profile){goTo('overview');}else{renderNav();document.getElementById('app').innerHTML=renderSetup();}
</script>
</body>
