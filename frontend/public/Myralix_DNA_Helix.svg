<svg viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" width="240" height="400">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A6E5C"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0A6E5C"/>
    </linearGradient>
  </defs>

  <!-- Teal strand -->
  <path d="M30,10 C70,30 90,70 60,100 C30,130 70,170 90,190"
        stroke="url(#tealGrad)" stroke-width="4" fill="none" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="0 60 100" to="360 60 100" dur="35s" repeatCount="indefinite"/>
  </path>

  <!-- Amber strand -->
  <path d="M90,10 C50,30 30,70 60,100 C90,130 50,170 30,190"
        stroke="url(#amberGrad)" stroke-width="4" fill="none" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="0 60 100" to="-360 60 100" dur="35s" repeatCount="indefinite"/>
  </path>

  <!-- Top left dot (amber) -->
  <circle cx="42" cy="50" r="5" fill="#F59E0B" opacity=".9">
    <animate attributeName="r" values="5;7.5;5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Top right dot (teal) -->
  <circle cx="78" cy="50" r="5" fill="#14B8A6" opacity=".9">
    <animate attributeName="r" values="5;7.5;5" dur="3s" begin=".5s" repeatCount="indefinite"/>
  </circle>

  <!-- Center dot (white with subtle outline) -->
  <circle cx="60" cy="100" r="8" fill="#FFFFFF" opacity=".95">
    <animate attributeName="r" values="8;11;8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="100" r="8" fill="none" stroke="#14B8A6" stroke-width=".5" opacity=".3">
    <animate attributeName="r" values="8;11;8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom left dot (teal) -->
  <circle cx="42" cy="150" r="5" fill="#14B8A6" opacity=".9">
    <animate attributeName="r" values="5;7.5;5" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom right dot (amber) -->
  <circle cx="78" cy="150" r="5" fill="#F59E0B" opacity=".9">
    <animate attributeName="r" values="5;7.5;5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle connecting lines -->
  <line x1="42" y1="50" x2="78" y2="50" stroke="#FFFFFF" stroke-width="1" opacity=".15"/>
  <line x1="42" y1="150" x2="78" y2="150" stroke="#FFFFFF" stroke-width="1" opacity=".15"/>
</svg>
